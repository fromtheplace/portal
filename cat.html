<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FTP — CATALOGUE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
/* ── TOKENS (matches portal.html) ─────────────────────────────── */
:root {
  --bg:         #0b0a08;
  --surface:    #111009;
  --surface-2:  #181611;
  --border:     #252218;
  --border-hi:  #35301f;
  --amber:      #c8943a;
  --amber-dim:  #5e420f;
  --amber-pale: #e8c882;
  --red:        #bf2e2e;
  --red-dim:    #4a1212;
  --text:       #a89c82;
  --text-dim:   #4a4232;
  --text-hi:    #e0d4b8;
  --text-lo:    #2a2418;
  --font-disp:  'VT323', monospace;
  --font-mono:  'Share Tech Mono', monospace;
  --font-cond:  'Barlow Condensed', sans-serif;
  /* genre accent colours */
  --ALT:   #e8ff47;
  --RAP:   #ff4d4d;
  --ROCK:  #b05ce8;
  --JAZZ:  #c8a83a;
  --DJ:    #ff8c3a;
  --FOLK:  #7de847;
  --RNB:   #e847c5;
  --AMB:   #47c5e8;
  --EVENT: #47e8c5;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  min-height: 100%; background: var(--bg); color: var(--text);
  font-family: var(--font-mono); font-size: 13px; line-height: 1.5; overflow-x: hidden;
}

  .ytp-* {display:none!important;}
/* CRT grain overlay */
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='0.04'/%3E%3C/svg%3E");
  background-size: 256px; pointer-events: none; z-index: 999; mix-blend-mode: overlay;
}
/* CRT scanlines */
body::before {
  content: ''; position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px);
  pointer-events: none; z-index: 998;
}

/* ── MASTHEAD ──────────────────────────────────────────────────── */
#masthead {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: stretch;
  border-bottom: 1px solid var(--border);
  background: var(--surface); height: 60px;
}
.mast-logo-cell {
  display: flex; align-items: center; justify-content: center;
  padding: 8px 18px; border-right: 1px solid var(--border); flex-shrink: 0;
  font-family: var(--font-disp); font-size: 26px; color: var(--amber); letter-spacing: 0.12em;
}
.mast-center {
  flex: 1; display: flex; align-items: center; gap: 20px; padding: 0 20px;
}
.mast-on-air {
  display: flex; align-items: center; gap: 6px;
  padding: 3px 10px; border: 1px solid var(--red-dim); background: rgba(191,46,46,0.07);
}
.on-air-dot {
  width: 5px; height: 5px; border-radius: 50%; background: var(--red);
  animation: dot-pulse 1.4s ease-in-out infinite;
}
@keyframes dot-pulse {
  0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(191,46,46,0.5)}
  50%{opacity:0.5;box-shadow:0 0 0 5px rgba(191,46,46,0)}
}
.on-air-text { font-size: 8px; letter-spacing: 0.28em; color: var(--red); text-transform: uppercase; }
.mast-clock { font-family: var(--font-disp); font-size: 28px; color: var(--text-dim); letter-spacing: 0.1em; }
.mast-search-wrap {
  flex: 1; max-width: 340px; position: relative;
}
.mast-search-wrap input {
  width: 100%; background: var(--surface-2); border: 1px solid var(--border);
  color: var(--text-hi); padding: 7px 12px 7px 32px;
  font-family: var(--font-mono); font-size: 12px; outline: none;
  transition: border-color 0.2s; letter-spacing: 0.05em;
}
.mast-search-wrap input:focus { border-color: var(--amber-dim); }
.mast-search-wrap input::placeholder { color: var(--text-dim); }
.mast-search-wrap::before {
  content: '⌕'; position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
  color: var(--text-dim); font-size: 15px; pointer-events: none;
}
.mast-right {
  display: flex; align-items: center; padding: 0 18px; border-left: 1px solid var(--border); flex-shrink: 0; gap: 14px;
}
.mast-btn {
  font-size: 8px; letter-spacing: 0.25em; color: var(--text-dim);
  text-transform: uppercase; text-decoration: none; transition: color 0.15s; white-space: nowrap;
}
.mast-btn:hover, .mast-btn.active { color: var(--amber); }

/* ── HERO STRIP ────────────────────────────────────────────────── */
#hero-strip {
  border-bottom: 1px solid var(--border); background: var(--surface-2);
  padding: 7px 24px; display: flex; align-items: center; gap: 14px; min-height: 36px;
}
.hs-ch  { font-size: 8px; letter-spacing: 0.35em; color: var(--text-dim); text-transform: uppercase; white-space: nowrap; flex-shrink: 0; }
.hs-track { font-family: var(--font-disp); font-size: 21px; color: var(--text-hi); letter-spacing: 0.04em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
.hs-stats { font-size: 9px; color: var(--text-dim); letter-spacing: 0.12em; white-space: nowrap; flex-shrink: 0; }

/* ── LAYOUT ────────────────────────────────────────────────────── */
#app {
  display: grid;
  grid-template-columns: 200px 1fr;
  grid-template-rows: 1fr auto;
  height: calc(100vh - 97px); /* masthead 60 + hero 36 + 1px */
}

/* ── SIDEBAR ───────────────────────────────────────────────────── */
#sidebar {
  border-right: 1px solid var(--border);
  overflow-y: auto; padding: 14px 0;
  grid-row: 1 / 3;
}
.sb-label {
  font-size: 8px; letter-spacing: 0.4em; color: var(--text-dim);
  text-transform: uppercase; padding: 0 14px 8px;
}
.sb-btn {
  display: flex; align-items: center; gap: 9px;
  width: 100%; padding: 8px 14px;
  background: none; border: none; border-left: 2px solid transparent;
  color: var(--text-dim); font-family: var(--font-mono); font-size: 11px;
  cursor: pointer; transition: all 0.12s; text-align: left; letter-spacing: 0.04em;
  text-transform: uppercase;
}
.sb-btn:hover { background: var(--surface-2); color: var(--text); border-left-color: var(--amber-dim); }
.sb-btn.active { background: var(--surface-2); color: var(--amber); border-left-color: var(--amber); }
.sb-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.sb-count { margin-left: auto; font-size: 10px; color: var(--text-lo); }
.sb-btn.active .sb-count { color: var(--amber-dim); }
.sb-divider { height: 1px; background: var(--border); margin: 10px 14px; }
.sb-sort-btn {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 7px 14px;
  background: none; border: none; color: var(--text-dim);
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em;
  cursor: pointer; transition: color 0.12s; text-align: left; text-transform: uppercase;
}
.sb-sort-btn:hover, .sb-sort-btn.active { color: var(--amber); }

/* ── CONTENT AREA ──────────────────────────────────────────────── */
#content {
  overflow-y: auto;
  grid-row: 1 / 2;
}

/* ── VIEW TABS ─────────────────────────────────────────────────── */
.view-tabs {
  display: flex; align-items: center; gap: 0;
  border-bottom: 1px solid var(--border);
  padding: 0 20px; background: var(--surface);
  position: sticky; top: 0; z-index: 10;
}
.view-tab {
  font-size: 8px; letter-spacing: 0.3em; color: var(--text-dim);
  text-transform: uppercase; padding: 10px 14px;
  border-bottom: 2px solid transparent; cursor: pointer;
  transition: all 0.15s; background: none; border-top: none; border-left: none; border-right: none;
  font-family: var(--font-mono);
}
.view-tab:hover { color: var(--text); }
.view-tab.active { color: var(--amber); border-bottom-color: var(--amber); }
.view-tab-count { color: var(--amber-dim); margin-left: 6px; font-family: var(--font-disp); font-size: 14px; }

/* ── TILE GRID ─────────────────────────────────────────────────── */
#tile-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 1px; background: var(--border);
  padding: 0;
}
.tile {
  background: var(--surface); cursor: pointer; position: relative;
  transition: background 0.12s;
}
.tile:hover { background: var(--surface-2); }
.tile.playing { background: var(--surface-2); }

/* thumb */
.tile-thumb {
  position: relative; width: 100%; padding-top: 56.25%;
  background: #000; overflow: hidden;
}
.tile-thumb-img {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover;
  filter: sepia(0.4) brightness(0.72) contrast(1.1) saturate(0.75);
  transition: filter 0.25s, opacity 0.25s;
}
.tile:hover .tile-thumb-img,
.tile.playing .tile-thumb-img {
  filter: sepia(0.15) brightness(0.85) contrast(1.05) saturate(0.95);
}
/* live hover second image */
.tile-thumb-live {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; opacity: 0; transition: opacity 0.3s;
  filter: brightness(0.88) contrast(1.05);
}
.tile:hover .tile-thumb-live.ready { opacity: 1; }
.tile:hover .tile-thumb-img { opacity: 0; }

/* fallback plate */
.tile-thumb-fb {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #0c0a07 0%, #1a1610 100%);
}
.tile-thumb-fb span {
  font-family: var(--font-disp); font-size: 52px; color: var(--text-lo);
  letter-spacing: -2px; line-height: 1;
}
/* gradient over thumb bottom */
.tile-thumb::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(0deg, rgba(8,7,5,0.82) 0%, transparent 52%);
  pointer-events: none; z-index: 2;
}
/* genre badge */
.tile-genre {
  position: absolute; top: 7px; left: 7px; z-index: 3;
  font-family: var(--font-mono); font-size: 7px; letter-spacing: 0.22em;
  text-transform: uppercase; padding: 2px 6px; color: #000; font-weight: bold;
}
/* playing badge */
.tile-playing-badge {
  position: absolute; top: 7px; right: 7px; z-index: 3;
  font-family: var(--font-mono); font-size: 7px; letter-spacing: 0.22em;
  color: var(--amber); border: 1px solid rgba(200,148,58,0.5);
  background: rgba(200,148,58,0.12); padding: 2px 6px; text-transform: uppercase;
  display: none;
}
.tile.playing .tile-playing-badge { display: block; }
/* now-playing overlay at thumb bottom */
.tile-np {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 4;
  padding: 5px 8px 6px; pointer-events: none;
}
.tile-np-label { font-size: 7px; letter-spacing: 0.28em; color: rgba(200,148,58,0.6); text-transform: uppercase; margin-bottom: 1px; }
.tile-np-title { font-family: var(--font-disp); font-size: 15px; color: rgba(240,232,216,0.9); letter-spacing: 0.03em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.1; }
/* tile meta */
.tile-meta { padding: 7px 10px 9px; }
.tile-title { font-family: var(--font-cond); font-weight: 600; font-size: 12px; letter-spacing: 0.06em; color: var(--text-hi); text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.2; }
.tile-artist { font-size: 9px; color: var(--text-dim); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: 0.04em; }
.tile-dur { font-size: 9px; color: var(--text-lo); float: right; margin-top: -13px; }

/* ── LIST VIEW ─────────────────────────────────────────────────── */
#list-view { display: none; }
.list-header {
  display: grid; grid-template-columns: 36px 1fr 76px 66px 82px;
  padding: 8px 18px;
  font-size: 8px; letter-spacing: 0.3em; color: var(--text-dim); text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 42px; background: var(--bg); z-index: 9;
}
.list-row {
  display: grid; grid-template-columns: 36px 1fr 76px 66px 82px;
  padding: 0 18px; align-items: center; min-height: 44px;
  border-bottom: 1px solid rgba(37,34,24,0.6);
  cursor: pointer; transition: background 0.1s;
}
.list-row:hover { background: var(--surface-2); }
.list-row.playing { background: var(--surface-2); border-left: 2px solid var(--amber); }
.list-row-num {
  font-family: var(--font-disp); font-size: 18px; color: var(--text-lo);
  text-align: center; line-height: 1;
}
.list-row.playing .list-row-num { color: var(--amber); }
.playing-eq { display: none; gap: 2px; align-items: flex-end; height: 12px; justify-content: center; }
.list-row.playing .list-row-num-inner { display: none; }
.list-row.playing .playing-eq { display: flex; }
.playing-eq span {
  width: 2px; background: var(--amber); border-radius: 1px;
  animation: eq 0.7s ease infinite alternate;
}
.playing-eq span:nth-child(2) { animation-delay: 0.18s; }
.playing-eq span:nth-child(3) { animation-delay: 0.36s; }
@keyframes eq { from{height:3px} to{height:12px} }
.list-row-info { padding: 7px 10px 7px 0; min-width: 0; }
.list-row-title { font-family: var(--font-cond); font-size: 13px; font-weight: 600; letter-spacing: 0.05em; color: var(--text-hi); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-transform: uppercase; }
.list-row-artist { font-size: 9px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; letter-spacing: 0.04em; }
.list-genre-tag {
  font-family: var(--font-mono); font-size: 7px; font-weight: 700; letter-spacing: 0.18em;
  padding: 2px 6px; color: #000; text-transform: uppercase; width: fit-content;
}
.list-row-dur { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); text-align: center; }
.list-yt-link {
  font-size: 8px; letter-spacing: 0.18em; color: var(--text-dim);
  text-decoration: none; border: 1px solid var(--border);
  padding: 3px 7px; transition: all 0.15s; text-transform: uppercase;
  text-align: center; display: block;
}
.list-yt-link:hover { color: var(--amber); border-color: var(--amber-dim); }

/* ── CHART VIEW ────────────────────────────────────────────────── */
#chart-view { display: none; padding: 20px; }
.chart-header {
  display: flex; align-items: baseline; gap: 12px; margin-bottom: 18px;
  padding-bottom: 10px; border-bottom: 1px solid var(--border);
}
.chart-title { font-family: var(--font-disp); font-size: 28px; color: var(--amber); letter-spacing: 0.1em; }
.chart-sub { font-size: 9px; color: var(--text-dim); letter-spacing: 0.2em; text-transform: uppercase; }
.chart-period-btns { display: flex; gap: 6px; margin-left: auto; }
.chart-period-btn {
  font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim);
  padding: 3px 8px; border: 1px solid var(--border); background: none; cursor: pointer;
  transition: all 0.15s; font-family: var(--font-mono);
}
.chart-period-btn:hover, .chart-period-btn.active { color: var(--amber); border-color: var(--amber-dim); }

.chart-top { display: grid; grid-template-columns: 1fr 280px; gap: 20px; margin-bottom: 20px; }
.chart-list { display: flex; flex-direction: column; gap: 0; border: 1px solid var(--border); }
.chart-row {
  display: grid; grid-template-columns: 28px 52px 1fr 72px 44px;
  align-items: center; padding: 0 12px; min-height: 48px;
  border-bottom: 1px solid rgba(37,34,24,0.5); cursor: pointer;
  transition: background 0.1s; gap: 0;
}
.chart-row:last-child { border-bottom: none; }
.chart-row:hover { background: var(--surface-2); }
.chart-row.playing { background: var(--surface-2); border-left: 2px solid var(--amber); }
.chart-rank {
  font-family: var(--font-disp); font-size: 22px; color: var(--text-lo);
  text-align: center; line-height: 1;
}
.chart-rank.top3 { color: var(--amber); }
.chart-thumb-sm {
  width: 40px; height: 28px; object-fit: cover; display: block; margin: 0 8px;
  filter: sepia(0.4) brightness(0.7) contrast(1.1);
}
.chart-row:hover .chart-thumb-sm { filter: sepia(0.1) brightness(0.9); }
.chart-row.playing .chart-thumb-sm { filter: sepia(0) brightness(1); }
.chart-info { min-width: 0; padding: 0 8px; }
.chart-info-title { font-family: var(--font-cond); font-size: 12px; font-weight: 600; letter-spacing: 0.06em; color: var(--text-hi); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-transform: uppercase; }
.chart-info-sub { font-size: 9px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chart-plays { font-family: var(--font-disp); font-size: 20px; color: var(--amber-dim); text-align: right; white-space: nowrap; }
.chart-plays strong { color: var(--amber); }
.chart-move { font-size: 8px; letter-spacing: 0.1em; text-align: center; }
.chart-move.up { color: #7de847; }
.chart-move.down { color: var(--red); }
.chart-move.same { color: var(--text-lo); }

/* genre breakdown panel */
.chart-breakdown { border: 1px solid var(--border); padding: 14px; display: flex; flex-direction: column; gap: 10px; }
.breakdown-title { font-family: var(--font-disp); font-size: 20px; color: var(--text-hi); letter-spacing: 0.08em; margin-bottom: 4px; }
.breakdown-row { display: flex; flex-direction: column; gap: 3px; }
.breakdown-genre-label { display: flex; justify-content: space-between; align-items: baseline; }
.breakdown-name { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.breakdown-count { font-family: var(--font-disp); font-size: 18px; color: var(--amber); }
.breakdown-bar-track { height: 3px; background: var(--border); width: 100%; }
.breakdown-bar-fill { height: 3px; transition: width 1s ease; }

/* recent plays timeline */
.chart-timeline { margin-top: 0; border: 1px solid var(--border); }
.timeline-head {
  padding: 9px 14px 8px; border-bottom: 1px solid var(--border);
  font-size: 8px; letter-spacing: 0.35em; text-transform: uppercase; color: var(--text-dim);
  display: flex; justify-content: space-between; align-items: center;
}
.timeline-entry {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; border-bottom: 1px solid rgba(37,34,24,0.4);
  cursor: pointer; transition: background 0.1s;
}
.timeline-entry:last-child { border-bottom: none; }
.timeline-entry:hover { background: var(--surface-2); }
.timeline-time { font-family: var(--font-disp); font-size: 17px; color: var(--text-dim); width: 54px; flex-shrink: 0; }
.timeline-thumb { width: 36px; height: 26px; object-fit: cover; flex-shrink: 0; filter: sepia(0.4) brightness(0.7); }
.timeline-info { flex: 1; min-width: 0; }
.timeline-title { font-family: var(--font-cond); font-size: 11px; font-weight: 600; color: var(--text-hi); text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: 0.04em; }
.timeline-artist { font-size: 9px; color: var(--text-dim); }
.timeline-tag { font-size: 7px; letter-spacing: 0.18em; padding: 1px 5px; color: #000; text-transform: uppercase; flex-shrink: 0; }

.no-results {
  padding: 50px 20px; text-align: center;
  font-size: 11px; color: var(--text-dim); letter-spacing: 0.2em; text-transform: uppercase;
  display: none;
}

/* ── PLAYER BAR ────────────────────────────────────────────────── */
#player-bar {
  grid-column: 2; grid-row: 2;
  border-top: 1px solid var(--border);
  background: var(--surface);
  display: flex; align-items: center; gap: 16px; padding: 12px 20px;
  position: relative;
}
/* YT stripe — matches portal's CRT feel: thin amber line at top */
#player-bar::before {
  content: ''; position: absolute; top: -1px; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent 0%, var(--amber-dim) 30%, var(--amber) 50%, var(--amber-dim) 70%, transparent 100%);
}
.player-thumb-wrap {
  width: 72px; height: 48px; flex-shrink: 0; position: relative; overflow: hidden;
  border: 1px solid var(--border); background: var(--surface-2);
}
.player-thumb-img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  filter: sepia(0.3) brightness(0.8) contrast(1.1);
}
/* striping overlay on the player thumb — VT style */
.player-thumb-wrap::after {
  content: ''; position: absolute; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.18) 2px, rgba(0,0,0,0.18) 3px);
  pointer-events: none;
}
.player-fb { font-family: var(--font-disp); font-size: 28px; color: var(--text-lo); line-height: 1; }
.player-info { flex: 1; min-width: 0; }
.player-title { font-family: var(--font-cond); font-weight: 600; font-size: 14px; letter-spacing: 0.07em; color: var(--text-hi); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-transform: uppercase; }
.player-artist { font-size: 9px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; letter-spacing: 0.04em; }
.player-genre-dot {
  display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 5px; vertical-align: middle;
}
.player-idle { color: var(--text-lo); letter-spacing: 0.2em; font-size: 10px; text-transform: uppercase; }

.progress-wrap { flex: 1; max-width: 360px; display: flex; align-items: center; gap: 8px; }
.prog-time { font-family: var(--font-disp); font-size: 16px; color: var(--text-dim); flex-shrink: 0; width: 38px; text-align: center; }
.prog-track { flex: 1; height: 2px; background: var(--border); cursor: pointer; position: relative; }
.prog-fill { height: 100%; background: var(--amber); width: 0%; transition: width 0.35s linear; }

.controls { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.ctrl { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 16px; padding: 5px; transition: color 0.12s; display: flex; align-items: center; }
.ctrl:hover { color: var(--text-hi); }
.ctrl.play {
  width: 36px; height: 36px; background: var(--amber); color: #0b0a08;
  border: none; font-size: 13px; transition: background 0.12s;
}
.ctrl.play:hover { background: var(--amber-pale); }

.toggle-video {
  font-size: 7px; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--text-dim); border: 1px solid var(--border);
  padding: 5px 9px; background: none; cursor: pointer; transition: all 0.15s;
  font-family: var(--font-mono); flex-shrink: 0;
}
.toggle-video:hover { color: var(--amber); border-color: var(--amber-dim); }
.toggle-video.on { color: var(--amber); border-color: var(--amber); }

/* ── FLOATING YT PLAYER ────────────────────────────────────────── */
#yt-float {
  position: fixed; bottom: 78px; right: 18px;
  width: 300px; height: 169px;
  border: 1px solid var(--border-hi); background: #000;
  display: none; z-index: 200; box-shadow: 0 4px 24px rgba(0,0,0,0.6);
}
#yt-float.on { display: block; }
/* amber stripe at top of float player — matching portal feel */
#yt-float::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--amber-dim), var(--amber), var(--amber-dim));
  z-index: 1;
}
/* scanlines on float player */
#yt-float::after {
  content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 10;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px);
}
#yt-inner { width: 100%; height: 100%; }

/* scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); }

@media (max-width: 700px) {
  #app { grid-template-columns: 1fr; }
  #sidebar { display: none; }
  .chart-top { grid-template-columns: 1fr; }
}
</style>
</head>

// ── PLAY TRACKING ──────────────────────────────────────────────────
// In-memory play counters + history. Persisted to sessionStorage.
let playCounts = {};   // trackIdx → count
let playHistory = [];  // [{trackIdx, playedAt: timestamp, title, artist, genre, id}, …]

function loadSession() {
  try {
    playCounts  = JSON.parse(sessionStorage.getItem('ftp_counts')  || '{}');
    playHistory = JSON.parse(sessionStorage.getItem('ftp_history') || '[]');
  } catch(e) {}
}
function saveSession() {
  sessionStorage.setItem('ftp_counts',  JSON.stringify(playCounts));
  sessionStorage.setItem('ftp_history', JSON.stringify(playHistory));
}
function recordPlay(idx) {
  const t = TRACKS[idx];
  playCounts[idx] = (playCounts[idx] || 0) + 1;
  playHistory.unshift({ idx, playedAt: Date.now(), title: t.title, artist: t.artist, genre: t.genre, id: t.id });
  if (playHistory.length > 100) playHistory.length = 100;
  saveSession();
  if (activeView === 'chart') renderChart();
}
loadSession();

// ── HELPERS ────────────────────────────────────────────────────────
function fmtDur(s) {
  if (!s || s <= 0) return '--:--';
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), ss = s%60;
  return h ? `${h}:${pad(m)}:${pad(ss)}` : `${m}:${pad(ss)}`;
}
function pad(n) { return String(n).padStart(2,'0'); }
function fmtTime(ts) {
  const d = new Date(ts);
  return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function ytThumb(id, q) { return `https://i.ytimg.com/vi/${id}/${q}.jpg`; }
function genreColor(g) { return GENRE_META[g]?.color || '#888'; }
function getFiltered() {
  let arr = TRACKS.map((t,i) => ({ t, i }));
  if (activeGenre !== 'ALL') arr = arr.filter(({t}) => t.genre === activeGenre);
  if (searchTerm) {
    const q = searchTerm.toLowerCase();
    arr = arr.filter(({t}) => t.title.toLowerCase().includes(q) || t.artist.toLowerCase().includes(q));
  }
  if (sortBy === 'az')   arr.sort((a,b) => a.t.artist.localeCompare(b.t.artist));
  if (sortBy === 'dur')  arr.sort((a,b) => (b.t.end-b.t.start)-(a.t.end-a.t.start));
  if (sortBy === 'plays') arr.sort((a,b) => (playCounts[b.i]||0)-(playCounts[a.i]||0));
  return arr;
}

// ── SIDEBAR ────────────────────────────────────────────────────────
function buildSidebar() {
  const genreCounts = {};
  TRACKS.forEach(t => genreCounts[t.genre] = (genreCounts[t.genre]||0)+1);
  let h = '<div class="sb-label">Genre</div>';
  h += `<button class="sb-btn active" data-genre="ALL"><span class="sb-dot" style="background:#888"></span>All<span class="sb-count">${TRACKS.length}</span></button>`;
  Object.keys(GENRE_META).filter(g => g!=='ALL').forEach(g => {
    const c = genreCounts[g]||0; if (!c) return;
    h += `<button class="sb-btn" data-genre="${g}"><span class="sb-dot" style="background:${GENRE_META[g].color}"></span>${GENRE_META[g].label}<span class="sb-count">${c}</span></button>`;
  });
  h += '<div class="sb-divider"></div><div class="sb-label">Sort</div>';
  [['default','Default'],['az','Artist A–Z'],['dur','Duration'],['plays','Most Played']].forEach(([v,l]) => {
    h += `<button class="sb-sort-btn${v==='default'?' active':''}" data-sort="${v}">${l}</button>`;
  });
  const sb = document.getElementById('sidebar');
  sb.innerHTML = h;
  sb.querySelectorAll('.sb-btn').forEach(b => b.addEventListener('click', () => {
    activeGenre = b.dataset.genre;
    sb.querySelectorAll('.sb-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    render();
  }));
  sb.querySelectorAll('.sb-sort-btn').forEach(b => b.addEventListener('click', () => {
    sortBy = b.dataset.sort;
    sb.querySelectorAll('.sb-sort-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    render();
  }));
}

// ── TILE RENDER ────────────────────────────────────────────────────
function renderTiles(items) {
  const grid = document.getElementById('tile-grid');
  const noRes = document.getElementById('no-results-tiles');
  if (!items.length) { grid.innerHTML = ''; noRes.style.display = 'block'; return; }
  noRes.style.display = 'none';

  grid.innerHTML = items.map(({t,i}) => {
    const dur = t.end > t.start ? fmtDur(t.end-t.start) : '';
    const gc  = genreColor(t.genre);
    const pc  = playCounts[i] || 0;
    return `<div class="tile${i===currentIdx?' playing':''}" data-idx="${i}">
      <div class="tile-thumb">
        <img class="tile-thumb-img" src="${ytThumb(t.id,'mqdefault')}"
             onerror="this.style.display='none';this.nextElementSibling.style.display='none';this.parentElement.querySelector('.tile-thumb-fb').style.display='flex'"
             loading="lazy" alt="">
        <img class="tile-thumb-live" alt="">
        <div class="tile-thumb-fb" style="display:none"><span>${t.genre}</span></div>
        <span class="tile-genre" style="background:${gc}">${t.genre}</span>
        <span class="tile-playing-badge">ON AIR</span>
        <div class="tile-np">
          ${pc ? `<div class="tile-np-label">Played ${pc}×</div>` : ''}
          <div class="tile-np-title">${esc(t.song || t.title)}</div>
        </div>
      </div>
      <div class="tile-meta">
        <div class="tile-title">${esc(t.artist)}</div>
        <div class="tile-artist">${esc(t.song)}</div>
        ${dur ? `<div class="tile-dur">${dur}</div>` : ''}
      </div>
    </div>`;
  }).join('');

  grid.querySelectorAll('.tile').forEach(tile => {
    const idx = parseInt(tile.dataset.idx);
    // lazy live-thumb on hover (same as portal)
    let liveLoaded = false;
    const liveImg  = tile.querySelector('.tile-thumb-live');
    tile.addEventListener('mouseenter', () => {
      if (liveLoaded) return;
      liveLoaded = true;
      const img = new Image();
      img.onload  = () => { liveImg.src = img.src; liveImg.classList.add('ready'); };
      img.onerror = () => { /* try hqdefault */ const img2 = new Image(); img2.onload = () => { liveImg.src=img2.src; liveImg.classList.add('ready'); }; img2.src = ytThumb(TRACKS[idx].id,'hqdefault'); };
      img.src = ytThumb(TRACKS[idx].id,'maxresdefault');
    });
    tile.addEventListener('click', () => playTrack(idx));
  });
}

// ── CHART RENDER ───────────────────────────────────────────────────
function renderChart() {
  const genreCounts = {};
  TRACKS.forEach(t => genreCounts[t.genre]=(genreCounts[t.genre]||0)+1);

  // Top tracks by plays, or recent
  let ranked = [];
  if (chartPeriod === 'plays') {
    ranked = Object.entries(playCounts)
      .sort((a,b) => b[1]-a[1])
      .slice(0,15)
      .map(([idx,cnt]) => ({ idx:parseInt(idx), cnt }));
    // pad with random tracks if < 10 plays yet
    if (ranked.length < 10) {
      const played = new Set(ranked.map(r=>r.idx));
      const extras = TRACKS.map((_,i)=>i).filter(i=>!played.has(i)).slice(0, 10-ranked.length);
      extras.forEach(idx => ranked.push({ idx, cnt: 0 }));
    }
  } else if (chartPeriod === 'recent') {
    const seen = new Set();
    ranked = playHistory.filter(h => { if (seen.has(h.idx)) return false; seen.add(h.idx); return true; })
      .slice(0,15).map((h,n) => ({ idx:h.idx, cnt:playCounts[h.idx]||0, recent:n }));
    if (ranked.length < 5) {
      ranked = TRACKS.slice(0,15).map((_,i) => ({idx:i, cnt:playCounts[i]||0}));
    }
  } else {
    // by genre: top track per genre
    const byGenre = {};
    TRACKS.forEach((t,i) => {
      if (!byGenre[t.genre] || (playCounts[i]||0) > (playCounts[byGenre[t.genre]]||0)) byGenre[t.genre] = i;
    });
    ranked = Object.entries(byGenre).map(([g,i]) => ({idx:i, cnt:playCounts[i]||0, genre:g}))
      .sort((a,b)=>b.cnt-a.cnt);
  }

  // Chart list
  const chartList = document.getElementById('chart-list');
  chartList.innerHTML = ranked.slice(0,10).map(({idx,cnt},n) => {
    const t = TRACKS[idx]; if (!t) return '';
    const dur = t.end>t.start ? fmtDur(t.end-t.start) : '';
    const gc  = genreColor(t.genre);
    const isTop = n < 3;
    const move  = cnt > 0 ? '↑' : '—';
    const moveClass = cnt > 0 ? 'up' : 'same';
    return `<div class="chart-row${idx===currentIdx?' playing':''}" data-idx="${idx}">
      <div class="chart-rank${isTop?' top3':''}">${n+1}</div>
      <img class="chart-thumb-sm" src="${ytThumb(t.id,'mqdefault')}" loading="lazy" alt="" onerror="this.style.display='none'">
      <div class="chart-info">
        <div class="chart-info-title">${esc(t.artist)}</div>
        <div class="chart-info-sub">${esc(t.song)}</div>
      </div>
      <div class="chart-plays">${cnt ? `<strong>${cnt}</strong>×` : '<span style="color:var(--text-lo)">—</span>'}</div>
      <div class="chart-move ${moveClass}">${move}</div>
    </div>`;
  }).join('');
  chartList.querySelectorAll('.chart-row').forEach(row => {
    row.addEventListener('click', () => playTrack(parseInt(row.dataset.idx)));
  });

  // Genre breakdown
  const maxGenre = Math.max(...Object.values(genreCounts));
  const breakdown = document.getElementById('chart-breakdown');
  breakdown.innerHTML = `<div class="breakdown-title">Genre Mix</div>` +
    Object.entries(genreCounts).sort((a,b)=>b[1]-a[1]).map(([g,c]) => {
      const gc = genreColor(g);
      const pct = Math.round((c/maxGenre)*100);
      return `<div class="breakdown-row">
        <div class="breakdown-genre-label">
          <span class="breakdown-name" style="color:${gc}">${GENRE_META[g]?.label||g}</span>
          <span class="breakdown-count">${c}</span>
        </div>
        <div class="breakdown-bar-track"><div class="breakdown-bar-fill" style="width:${pct}%;background:${gc}"></div></div>
      </div>`;
    }).join('');

  // History timeline
  const entries = document.getElementById('timeline-entries');
  document.getElementById('history-count').textContent = `${playHistory.length} play${playHistory.length!==1?'s':''} this session`;
  if (!playHistory.length) {
    entries.innerHTML = `<div style="padding:20px 14px;font-size:9px;color:var(--text-lo);letter-spacing:0.2em;text-transform:uppercase">No plays yet — start listening to build your chart</div>`;
  } else {
    entries.innerHTML = playHistory.slice(0,20).map(h => {
      const gc = genreColor(h.genre);
      return `<div class="timeline-entry" data-idx="${h.idx}">
        <div class="timeline-time">${fmtTime(h.playedAt)}</div>
        <img class="timeline-thumb" src="${ytThumb(h.id,'mqdefault')}" loading="lazy" alt="" onerror="this.style.display='none'">
        <div class="timeline-info">
          <div class="timeline-title">${esc(h.title)}</div>
          <div class="timeline-artist">${esc(h.artist)}</div>
        </div>
        <span class="timeline-tag" style="background:${gc}">${h.genre}</span>
      </div>`;
    }).join('');
    entries.querySelectorAll('.timeline-entry').forEach(e => {
      e.addEventListener('click', () => playTrack(parseInt(e.dataset.idx)));
    });
  }
}

// ── CHART PERIOD BUTTONS ───────────────────────────────────────────
document.querySelectorAll('.chart-period-btn').forEach(b => b.addEventListener('click', () => {
  chartPeriod = b.dataset.period;
  document.querySelectorAll('.chart-period-btn').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  renderChart();
}));

// ── MAIN RENDER ────────────────────────────────────────────────────
function render() {
  filteredIdxs = getFiltered();
  document.getElementById('tab-count-tiles').textContent = filteredIdxs.length;
  document.getElementById('hs-stats').textContent = `${filteredIdxs.length} / ${TRACKS.length} tracks`;
  renderTiles(filteredIdxs);
  renderList(filteredIdxs);
  if (activeView === 'chart') renderChart();
}

// ── PLAYBACK ───────────────────────────────────────────────────────
function playTrack(idx) {
  if (idx < 0 || idx >= TRACKS.length) return;
  const t = TRACKS[idx];
  currentIdx = idx;
  isPlaying  = true;
  recordPlay(idx);

  // Update player bar
  const wrap = document.getElementById('player-thumb-wrap');
  wrap.innerHTML = `<img class="player-thumb-img" src="${ytThumb(t.id,'mqdefault')}" onerror="this.src='${ytThumb(t.id,'hqdefault')}'" alt=""><div class="player-thumb-wrap" style="position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.18) 2px,rgba(0,0,0,0.18) 3px)"></div>`;
  document.getElementById('player-title').innerHTML = `<span class="player-genre-dot" style="background:${genreColor(t.genre)}"></span>${esc(t.title)}`;
  document.getElementById('player-artist').textContent = t.artist;
  document.getElementById('prog-dur').textContent = fmtDur(Math.max(0,t.end-t.start));
  document.getElementById('prog-cur').textContent = '0:00';
  document.getElementById('prog-fill').style.width = '0%';
  document.getElementById('btn-play').textContent = '⏸';

  // Load YT
  ensureYT(() => {
    if (!ytPlayer) {
      buildYTPlayer(t);
    } else {
      ytPlayer.loadVideoById({ videoId: t.id, startSeconds: t.start, endSeconds: t.end });
      ytPlayer.playVideo();
    }
  });

  startProgress(t);
  render(); // re-render to show playing state
}

function ensureYT(cb) {
  if (ytReady) { cb(); return; }
  if (!ytApiLoading) {
    ytApiLoading = true;
    const s = document.createElement('script');
    s.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(s);
  }
  const wait = setInterval(() => { if (ytReady) { clearInterval(wait); cb(); } }, 100);
}

window.onYouTubeIframeAPIReady = function() { ytReady = true; };

function buildYTPlayer(t) {
  const inner = document.getElementById('yt-inner');
  inner.innerHTML = '';
  const div = document.createElement('div'); div.id = 'yt-p'; inner.appendChild(div);
  ytPlayer = new YT.Player('yt-p', {
    width: '300', height: '169', videoId: t.id,
    playerVars: { start: t.start, end: t.end, autoplay: 1, controls: 1, rel: 0, modestbranding: 1 },
    events: {
      onStateChange(e) {
        if (e.data === YT.PlayerState.ENDED)  onTrackEnd();
        if (e.data === YT.PlayerState.PLAYING){ isPlaying=true;  document.getElementById('btn-play').textContent='⏸'; }
        if (e.data === YT.PlayerState.PAUSED) { isPlaying=false; document.getElementById('btn-play').textContent='▶'; }
      }
    }
  });
}

function onTrackEnd() {
  const fi = filteredIdxs.findIndex(({i})=>i===currentIdx);
  if (fi >= 0 && fi < filteredIdxs.length-1) playTrack(filteredIdxs[fi+1].i);
}

function startProgress(t) {
  clearInterval(progInterval);
  const dur = Math.max(0, t.end - t.start); if (!dur) return;
  progInterval = setInterval(() => {
    if (!ytPlayer || !isPlaying) return;
    try {
      const cur = Math.max(0, ytPlayer.getCurrentTime() - t.start);
      document.getElementById('prog-fill').style.width = Math.min(100,(cur/dur)*100)+'%';
      document.getElementById('prog-cur').textContent  = fmtDur(Math.floor(cur));
    } catch(e){}
  }, 500);
}

// Controls
document.getElementById('btn-play').addEventListener('click', () => {
  if (!ytPlayer) return;
  isPlaying ? ytPlayer.pauseVideo() : ytPlayer.playVideo();
});
document.getElementById('btn-prev').addEventListener('click', () => {
  const fi = filteredIdxs.findIndex(({i})=>i===currentIdx);
  if (fi > 0) playTrack(filteredIdxs[fi-1].i);
});
document.getElementById('btn-next').addEventListener('click', () => {
  const fi = filteredIdxs.findIndex(({i})=>i===currentIdx);
  if (fi >= 0 && fi < filteredIdxs.length-1) playTrack(filteredIdxs[fi+1].i);
});
document.getElementById('prog-track').addEventListener('click', e => {
  if (!ytPlayer || currentIdx < 0) return;
  const t = TRACKS[currentIdx];
  const pct = (e.clientX - e.currentTarget.getBoundingClientRect().left) / e.currentTarget.offsetWidth;
  ytPlayer.seekTo(t.start + pct*(t.end-t.start), true);
});

// Video toggle
document.getElementById('toggle-video').addEventListener('click', () => {
  videoOn = !videoOn;
  document.getElementById('yt-float').classList.toggle('on', videoOn);
  document.getElementById('toggle-video').classList.toggle('on', videoOn);
  if (videoOn) ensureYT(() => {});
});

// Search
document.getElementById('search').addEventListener('input', e => { searchTerm = e.target.value.trim(); render(); });

// Keyboard
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code==='Space')      { e.preventDefault(); document.getElementById('btn-play').click(); }
  if (e.code==='ArrowRight') document.getElementById('btn-next').click();
  if (e.code==='ArrowLeft')  document.getElementById('btn-prev').click();
});

// Clock (matches portal)
function tick() {
  const n = new Date();
  document.getElementById('clock').textContent =
    [n.getHours(),n.getMinutes(),n.getSeconds()].map(x=>String(x).padStart(2,'0')).join(':');
}
setInterval(tick, 1000); tick();

// ── INIT ───────────────────────────────────────────────────────────
buildSidebar();
document.getElementById('tile-view').style.display  = '';
document.getElementById('list-view').style.display  = 'none';
document.getElementById('chart-view').style.display = 'none';
render();
</script>
</body>
</html>
