<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FTP — CATALOGUE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ──────────────────────────────────────────────────────── */
:root {
  --bg:         #0b0a08;
  --surface:    #111009;
  --surface-2:  #181611;
  --border:     #252218;
  --border-hi:  #35301f;
  --amber:      #c8943a;
  --amber-dim:  #5e420f;
  --amber-pale: #e8c882;
  --red:        #bf2e2e;
  --red-dim:    #4a1212;
  --text:       #a89c82;
  --text-dim:   #4a4232;
  --text-hi:    #e0d4b8;
  --text-lo:    #2a2418;
  --font-disp:  'VT323', monospace;
  --font-mono:  'Share Tech Mono', monospace;
  --font-cond:  'Barlow Condensed', sans-serif;
  --player-h:   64px;
  --vid-w:      300px;   /* right video panel width on desktop */
  --txt-scale:  1;
}

/* ── LIGHT MODE ──────────────────────────────────────────────────── */
[data-theme="light"] {
  --bg:        #f0ece4;
  --surface:   #e8e2d8;
  --surface-2: #ddd8cc;
  --border:    #c8c0b0;
  --border-hi: #b8b0a0;
  --text:      #5a5040;
  --text-dim:  #9a9080;
  --text-hi:   #2a2018;
  --text-lo:   #c0b8a8;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg); color: var(--text);
  font-family: var(--font-mono);
  font-size: calc(13px * var(--txt-scale));
  line-height: 1.5; overflow: hidden;
  transition: background 0.2s, color 0.2s;
}
/* CRT grain — dark only */
[data-theme="dark"] body::after {
  content: ''; position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='0.04'/%3E%3C/svg%3E");
  background-size: 256px; pointer-events: none; z-index: 999; mix-blend-mode: overlay;
}
[data-theme="dark"] body::before {
  content: ''; position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px);
  pointer-events: none; z-index: 998;
}

/* ── SHELL — fixed regions ───────────────────────────────────────── */
#masthead {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: stretch;
  border-bottom: 1px solid var(--border);
  background: var(--surface); height: 52px;
}
#hero-strip {
  position: fixed; top: 52px; left: 0; right: 0; z-index: 99;
  border-bottom: 1px solid var(--border); background: var(--surface-2);
  padding: 5px 16px; display: flex; align-items: center; gap: 10px; height: 32px;
}
#player-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  border-top: 1px solid var(--border-hi);
  background: var(--surface);
  display: flex; align-items: center; gap: 10px;
  padding: 0 12px; height: var(--player-h);
}
#player-bar::before {
  content: ''; position: absolute; top: -1px; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--amber-dim) 30%, var(--amber) 50%, var(--amber-dim) 70%, transparent);
}

/* ── APP BODY ────────────────────────────────────────────────────── */
#app {
  position: fixed;
  top: 84px; bottom: var(--player-h); left: 0; right: 0;
  display: flex; overflow: hidden;
}

/* ── SIDEBAR ─────────────────────────────────────────────────────── */
#sidebar {
  width: 180px; flex-shrink: 0;
  border-right: 1px solid var(--border);
  overflow-y: auto; padding: 12px 0;
}
.sb-label {
  font-size: calc(7px * var(--txt-scale)); letter-spacing: 0.4em; color: var(--text-dim);
  text-transform: uppercase; padding: 0 12px 7px;
}
.sb-btn {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 7px 12px;
  background: none; border: none; border-left: 2px solid transparent;
  color: var(--text-dim); font-family: var(--font-mono);
  font-size: calc(10px * var(--txt-scale));
  cursor: pointer; transition: all 0.12s; text-align: left;
  letter-spacing: 0.04em; text-transform: uppercase;
}
.sb-btn:hover { background: var(--surface-2); color: var(--text); border-left-color: var(--amber-dim); }
.sb-btn.active { background: var(--surface-2); color: var(--amber); border-left-color: var(--amber); }
.sb-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.sb-count { margin-left: auto; font-size: calc(9px * var(--txt-scale)); color: var(--text-lo); }
.sb-btn.active .sb-count { color: var(--amber-dim); }
.sb-divider { height: 1px; background: var(--border); margin: 8px 12px; }
.sb-sort-btn {
  width: 100%; padding: 6px 12px;
  background: none; border: none; color: var(--text-dim);
  font-family: var(--font-mono); font-size: calc(9px * var(--txt-scale));
  letter-spacing: 0.08em; cursor: pointer; transition: color 0.12s;
  text-align: left; text-transform: uppercase;
}
.sb-sort-btn:hover, .sb-sort-btn.active { color: var(--amber); }

/* ── CONTENT + VIDEO WRAPPER ─────────────────────────────────────── */
#centre { flex: 1; display: flex; overflow: hidden; min-width: 0; }

/* ── CONTENT ─────────────────────────────────────────────────────── */
#content { flex: 1; overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column; min-width: 0; }

/* ── VIDEO PANEL (right side desktop) ───────────────────────────── */
#vid-panel {
  width: var(--vid-w); flex-shrink: 0;
  border-left: 1px solid var(--border);
  background: #000;
  display: none;          /* shown when video is toggled on */
  flex-direction: column;
  position: relative; overflow: hidden;
}
#vid-panel.on { display: flex; }

/* Video fills panel — no letterbox: object-fit cover via aspect trick */
#yt-wrap {
  width: 100%; flex: 1;
  position: relative; overflow: hidden; background: #000;
}
/* YT iframe fills wrapper completely, no bars */
#yt-inner {
  position: absolute;
  /* extend beyond edges to cut off YT chrome on all sides */
  top: -42px; bottom: -42px; left: -2px; right: -2px;
}
#yt-inner iframe,
#yt-inner > div { width: 100% !important; height: 100% !important; }

/* hard black masks over top/bottom YT chrome */
#yt-mask-top {
  position: absolute; top: 0; left: 0; right: 0; height: 44px;
  background: #000; z-index: 5; pointer-events: none;
}
#yt-mask-bot {
  position: absolute; bottom: 0; left: 0; right: 0; height: 44px;
  background: #000; z-index: 5; pointer-events: none;
}
/* amber stripe at top of panel */
#vid-panel::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--amber-dim), var(--amber), var(--amber-dim));
  z-index: 10; pointer-events: none;
}
/* CRT scanlines over video */
#vid-panel::after {
  content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 4;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px);
}
/* vid info strip at bottom of panel */
#vid-info {
  flex-shrink: 0; padding: 8px 10px;
  border-top: 1px solid var(--border);
  background: var(--surface);
}
#vid-info-title {
  font-family: var(--font-cond); font-weight: 600; font-size: calc(11px * var(--txt-scale));
  color: var(--text-hi); text-transform: uppercase; letter-spacing: 0.06em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#vid-info-artist { font-size: calc(9px * var(--txt-scale)); color: var(--text-dim); margin-top: 1px; }

/* ── MASTHEAD ────────────────────────────────────────────────────── */
.mast-logo {
  display: flex; align-items: center; justify-content: center;
  padding: 0 14px; border-right: 1px solid var(--border); flex-shrink: 0;
  font-family: var(--font-disp); font-size: calc(24px * var(--txt-scale));
  color: var(--amber); letter-spacing: 0.12em;
}
.mast-center {
  flex: 1; display: flex; align-items: center; gap: 10px; padding: 0 10px; min-width: 0;
}
.mast-on-air {
  display: flex; align-items: center; gap: 5px; flex-shrink: 0;
  padding: 2px 8px; border: 1px solid var(--red-dim); background: rgba(191,46,46,0.07);
}
.on-air-dot {
  width: 5px; height: 5px; border-radius: 50%; background: var(--red);
  animation: dot-pulse 1.4s ease-in-out infinite;
}
@keyframes dot-pulse {
  0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(191,46,46,0.5)}
  50%{opacity:0.5;box-shadow:0 0 0 5px rgba(191,46,46,0)}
}
.on-air-text { font-size: 7px; letter-spacing: 0.28em; color: var(--red); text-transform: uppercase; }
.mast-clock { font-family: var(--font-disp); font-size: 24px; color: var(--text-dim); letter-spacing: 0.1em; flex-shrink: 0; }
.mast-search { flex: 1; min-width: 0; max-width: 280px; position: relative; }
.mast-search input {
  width: 100%; background: var(--surface-2); border: 1px solid var(--border);
  color: var(--text-hi); padding: 5px 10px 5px 26px;
  font-family: var(--font-mono); font-size: calc(11px * var(--txt-scale)); outline: none;
  transition: border-color 0.2s;
}
.mast-search input:focus { border-color: var(--amber-dim); }
.mast-search input::placeholder { color: var(--text-dim); }
.mast-search::before {
  content: '⌕'; position: absolute; left: 7px; top: 50%; transform: translateY(-50%);
  color: var(--text-dim); font-size: 13px; pointer-events: none;
}
.mast-right {
  display: flex; align-items: center; padding: 0 10px; gap: 10px;
  border-left: 1px solid var(--border); flex-shrink: 0;
}
.mast-btn {
  font-size: 8px; letter-spacing: 0.22em; color: var(--text-dim);
  text-transform: uppercase; text-decoration: none; transition: color 0.15s; white-space: nowrap;
}
.mast-btn:hover { color: var(--amber); }

/* GUI controls in masthead */
.gui-btn {
  background: none; border: 1px solid var(--border);
  color: var(--text-dim); font-family: var(--font-mono); font-size: 8px;
  letter-spacing: 0.14em; text-transform: uppercase; padding: 3px 7px;
  cursor: pointer; transition: all 0.12s; white-space: nowrap; flex-shrink: 0;
}
.gui-btn:hover { color: var(--amber); border-color: var(--amber-dim); }
.gui-btn.active { color: var(--amber); border-color: var(--amber); background: rgba(200,148,58,0.08); }
.gui-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }

/* ── HERO STRIP ──────────────────────────────────────────────────── */
.hs-ch    { font-size: 7px; letter-spacing: 0.35em; color: var(--text-dim); text-transform: uppercase; flex-shrink: 0; }
.hs-track { font-family: var(--font-disp); font-size: calc(18px * var(--txt-scale)); color: var(--text-hi); letter-spacing: 0.04em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.hs-stats { font-size: 8px; color: var(--text-dim); letter-spacing: 0.1em; white-space: nowrap; flex-shrink: 0; }

/* ── VIEW TABS ───────────────────────────────────────────────────── */
.view-tabs {
  display: flex; align-items: center;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky; top: 0; z-index: 10; flex-shrink: 0; padding: 0 4px;
}
.view-tab {
  font-size: 7px; letter-spacing: 0.28em; color: var(--text-dim);
  text-transform: uppercase; padding: 9px 12px;
  border-bottom: 2px solid transparent; cursor: pointer;
  transition: all 0.15s; background: none;
  border-top: none; border-left: none; border-right: none;
  font-family: var(--font-mono); white-space: nowrap;
}
.view-tab:hover { color: var(--text); }
.view-tab.active { color: var(--amber); border-bottom-color: var(--amber); }
.view-tab-count { color: var(--amber-dim); margin-left: 4px; font-family: var(--font-disp); font-size: 13px; }

/* ── TILE GRID ───────────────────────────────────────────────────── */
#tile-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 1px; background: var(--border);
}
.tile { background: var(--surface); cursor: pointer; position: relative; transition: background 0.12s; }
.tile:hover { background: var(--surface-2); }
.tile.playing { background: var(--surface-2); }
.tile-thumb { position: relative; width: 100%; padding-top: 56.25%; background: #000; overflow: hidden; }
.tile-thumb-img {
  position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
  filter: sepia(0.4) brightness(0.72) contrast(1.1) saturate(0.75);
  transition: filter 0.25s, opacity 0.25s;
}
.tile:hover .tile-thumb-img, .tile.playing .tile-thumb-img { filter: sepia(0.1) brightness(0.88) contrast(1.05) saturate(0.95); }
.tile-thumb-live { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.3s; filter: brightness(0.88) contrast(1.05); }
.tile:hover .tile-thumb-live.ready { opacity: 1; }
.tile:hover .tile-thumb-img { opacity: 0; }
.tile-thumb-fb { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0c0a07, #1a1610); font-family: var(--font-disp); font-size: 36px; color: var(--text-lo); }
.tile-thumb::after { content: ''; position: absolute; inset: 0; background: linear-gradient(0deg, rgba(8,7,5,0.85) 0%, transparent 55%); pointer-events: none; z-index: 2; }
.tile-genre { position: absolute; top: 5px; left: 5px; z-index: 3; font-family: var(--font-mono); font-size: 6px; letter-spacing: 0.2em; text-transform: uppercase; padding: 2px 5px; color: #000; font-weight: bold; }
.tile-playing-badge { position: absolute; top: 5px; right: 5px; z-index: 3; font-family: var(--font-mono); font-size: 6px; letter-spacing: 0.2em; color: var(--amber); border: 1px solid rgba(200,148,58,0.5); background: rgba(200,148,58,0.12); padding: 2px 5px; text-transform: uppercase; display: none; }
.tile.playing .tile-playing-badge { display: block; }
.tile-np { position: absolute; bottom: 0; left: 0; right: 0; z-index: 4; padding: 4px 6px 5px; pointer-events: none; }
.tile-np-label { font-size: 6px; letter-spacing: 0.24em; color: rgba(200,148,58,0.65); text-transform: uppercase; margin-bottom: 1px; }
.tile-np-title { font-family: var(--font-disp); font-size: calc(14px * var(--txt-scale)); color: rgba(240,232,216,0.9); letter-spacing: 0.03em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.1; }
.tile-meta { padding: 6px 8px 8px; }
.tile-title { font-family: var(--font-cond); font-weight: 600; font-size: calc(11px * var(--txt-scale)); letter-spacing: 0.06em; color: var(--text-hi); text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.2; }
.tile-artist { font-size: calc(9px * var(--txt-scale)); color: var(--text-dim); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tile-dur { font-size: 8px; color: var(--text-lo); float: right; margin-top: -11px; }

/* ── LIST VIEW ───────────────────────────────────────────────────── */
.list-header {
  display: grid; grid-template-columns: 30px 1fr 58px 52px 66px;
  padding: 6px 12px; font-size: 7px; letter-spacing: 0.28em; color: var(--text-dim); text-transform: uppercase;
  border-bottom: 1px solid var(--border); position: sticky; top: 38px; background: var(--bg); z-index: 9;
}
.list-row {
  display: grid; grid-template-columns: 30px 1fr 58px 52px 66px;
  padding: 0 12px; align-items: center; min-height: 42px;
  border-bottom: 1px solid rgba(37,34,24,0.5); cursor: pointer; transition: background 0.1s;
}
.list-row:hover { background: var(--surface-2); }
.list-row.playing { background: var(--surface-2); border-left: 2px solid var(--amber); }
.list-row-num { display: flex; align-items: center; justify-content: center; font-family: var(--font-disp); font-size: 17px; color: var(--text-lo); line-height: 1; }
.list-row.playing .list-row-num { color: var(--amber); }
.list-row-num-inner { display: block; }
.list-row.playing .list-row-num-inner { display: none; }
.playing-eq { display: none; gap: 2px; align-items: flex-end; height: 12px; }
.list-row.playing .playing-eq { display: flex; }
.playing-eq span { width: 2px; background: var(--amber); border-radius: 1px; animation: eq 0.7s ease infinite alternate; }
.playing-eq span:nth-child(2) { animation-delay: 0.18s; }
.playing-eq span:nth-child(3) { animation-delay: 0.36s; }
@keyframes eq { from{height:3px} to{height:12px} }
.list-row-info { padding: 5px 8px 5px 0; min-width: 0; }
.list-row-title { font-family: var(--font-cond); font-size: calc(12px * var(--txt-scale)); font-weight: 600; letter-spacing: 0.05em; color: var(--text-hi); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-transform: uppercase; }
.list-row-artist { font-size: calc(9px * var(--txt-scale)); color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
.list-genre-tag { font-family: var(--font-mono); font-size: 6px; font-weight: 700; letter-spacing: 0.16em; padding: 2px 5px; color: #000; text-transform: uppercase; display: inline-block; }
.list-row-dur { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); text-align: center; }
.list-yt-link { font-size: 7px; letter-spacing: 0.14em; color: var(--text-dim); text-decoration: none; border: 1px solid var(--border); padding: 3px 6px; transition: all 0.15s; text-transform: uppercase; text-align: center; display: block; }
.list-yt-link:hover { color: var(--amber); border-color: var(--amber-dim); }

/* ── CHART VIEW ──────────────────────────────────────────────────── */
.chart-wrap { padding: 14px; }
.chart-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.chart-title { font-family: var(--font-disp); font-size: calc(26px * var(--txt-scale)); color: var(--amber); letter-spacing: 0.1em; }
.chart-sub { font-size: 8px; color: var(--text-dim); letter-spacing: 0.2em; text-transform: uppercase; }
.chart-source-badge { font-size: 7px; letter-spacing: 0.16em; text-transform: uppercase; padding: 2px 6px; border: 1px solid var(--amber-dim); color: var(--amber); background: rgba(200,148,58,0.08); }
.chart-period-btns { display: flex; gap: 4px; margin-left: auto; flex-wrap: wrap; }
.chart-period-btn { font-size: 7px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-dim); padding: 3px 7px; border: 1px solid var(--border); background: none; cursor: pointer; transition: all 0.15s; font-family: var(--font-mono); }
.chart-period-btn:hover, .chart-period-btn.active { color: var(--amber); border-color: var(--amber-dim); }
.chart-top { display: grid; grid-template-columns: 1fr 220px; gap: 14px; margin-bottom: 14px; }
.chart-list { display: flex; flex-direction: column; border: 1px solid var(--border); }
.chart-row { display: grid; grid-template-columns: 26px 46px 1fr 60px 36px; align-items: center; padding: 0 8px; min-height: 44px; border-bottom: 1px solid rgba(37,34,24,0.5); cursor: pointer; transition: background 0.1s; }
.chart-row:last-child { border-bottom: none; }
.chart-row:hover { background: var(--surface-2); }
.chart-row.playing { background: var(--surface-2); border-left: 2px solid var(--amber); }
.chart-rank { font-family: var(--font-disp); font-size: 20px; color: var(--text-lo); text-align: center; line-height: 1; }
.chart-rank.top3 { color: var(--amber); }
.chart-thumb-sm { width: 36px; height: 24px; object-fit: cover; display: block; margin: 0 5px; filter: sepia(0.4) brightness(0.7) contrast(1.1); }
.chart-row:hover .chart-thumb-sm { filter: sepia(0.1) brightness(0.9); }
.chart-info { min-width: 0; padding: 0 6px; }
.chart-info-title { font-family: var(--font-cond); font-size: calc(11px * var(--txt-scale)); font-weight: 600; letter-spacing: 0.05em; color: var(--text-hi); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-transform: uppercase; }
.chart-info-sub { font-size: 9px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chart-plays { font-family: var(--font-disp); font-size: 18px; color: var(--amber-dim); text-align: right; }
.chart-plays strong { color: var(--amber); }
.chart-move { font-size: 9px; text-align: center; }
.chart-move.up { color: #7de847; } .chart-move.down { color: var(--red); } .chart-move.same { color: var(--text-lo); }
.chart-breakdown { border: 1px solid var(--border); padding: 10px; }
.breakdown-title { font-family: var(--font-disp); font-size: calc(17px * var(--txt-scale)); color: var(--text-hi); margin-bottom: 8px; }
.breakdown-row { margin-bottom: 6px; }
.breakdown-genre-label { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2px; }
.breakdown-name { font-size: 8px; letter-spacing: 0.14em; text-transform: uppercase; }
.breakdown-count { font-family: var(--font-disp); font-size: 15px; }
.breakdown-bar-track { height: 2px; background: var(--border); }
.breakdown-bar-fill { height: 2px; transition: width 1s ease; }
.chart-timeline { border: 1px solid var(--border); }
.timeline-head { padding: 7px 10px; border-bottom: 1px solid var(--border); font-size: 7px; letter-spacing: 0.3em; color: var(--text-dim); text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }
.timeline-entry { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-bottom: 1px solid rgba(37,34,24,0.4); cursor: pointer; transition: background 0.1s; }
.timeline-entry:last-child { border-bottom: none; }
.timeline-entry:hover { background: var(--surface-2); }
.timeline-time { font-family: var(--font-disp); font-size: 15px; color: var(--text-dim); width: 44px; flex-shrink: 0; }
.timeline-thumb { width: 32px; height: 22px; object-fit: cover; flex-shrink: 0; filter: sepia(0.4) brightness(0.7); }
.timeline-info { flex: 1; min-width: 0; }
.timeline-title { font-family: var(--font-cond); font-size: calc(10px * var(--txt-scale)); font-weight: 600; color: var(--text-hi); text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.timeline-artist { font-size: 9px; color: var(--text-dim); }
.timeline-tag { font-size: 6px; letter-spacing: 0.14em; padding: 1px 4px; color: #000; text-transform: uppercase; flex-shrink: 0; }
.chart-loading { padding: 30px; text-align: center; font-size: 9px; letter-spacing: 0.24em; color: var(--text-dim); text-transform: uppercase; }
.chart-err { color: var(--red); }

/* ── NO RESULTS ──────────────────────────────────────────────────── */
.no-results { padding: 40px 16px; text-align: center; font-size: 10px; color: var(--text-dim); letter-spacing: 0.2em; text-transform: uppercase; display: none; }

/* ── PLAYER BAR ──────────────────────────────────────────────────── */
.player-thumb-wrap { width: 56px; height: 38px; flex-shrink: 0; position: relative; overflow: hidden; border: 1px solid var(--border); background: var(--surface-2); display: flex; align-items: center; justify-content: center; }
.player-thumb-img { width: 100%; height: 100%; object-fit: cover; display: block; filter: sepia(0.3) brightness(0.8) contrast(1.1); }
.player-thumb-wrap::after { content: ''; position: absolute; inset: 0; pointer-events: none; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.18) 2px, rgba(0,0,0,0.18) 3px); }
.player-fb { font-family: var(--font-disp); font-size: 20px; color: var(--text-lo); }
.player-info { flex: 1; min-width: 0; }
.player-title { font-family: var(--font-cond); font-weight: 600; font-size: calc(12px * var(--txt-scale)); letter-spacing: 0.06em; color: var(--text-hi); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-transform: uppercase; }
.player-artist { font-size: calc(9px * var(--txt-scale)); color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
.player-genre-dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
.player-idle { color: var(--text-lo); letter-spacing: 0.16em; font-size: 9px; text-transform: uppercase; }

.progress-wrap { display: flex; align-items: center; gap: 6px; flex-shrink: 0; width: 200px; }
.prog-time { font-family: var(--font-disp); font-size: 15px; color: var(--text-dim); flex-shrink: 0; width: 32px; text-align: center; }
.prog-track { flex: 1; height: 3px; background: var(--border); cursor: pointer; position: relative; border-radius: 1px; }
.prog-fill { height: 100%; background: var(--amber); width: 0%; transition: width 0.35s linear; border-radius: 1px; }

/* Volume slider */
.vol-wrap { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
.vol-icon { font-size: 11px; color: var(--text-dim); cursor: pointer; flex-shrink: 0; user-select: none; }
.vol-icon:hover { color: var(--amber); }
input[type=range].vol-slider {
  -webkit-appearance: none; appearance: none;
  width: 64px; height: 3px; background: var(--border); outline: none; border-radius: 1px; cursor: pointer;
}
input[type=range].vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 10px; height: 10px; border-radius: 50%;
  background: var(--amber); cursor: pointer;
}
input[type=range].vol-slider::-moz-range-thumb { width: 10px; height: 10px; border-radius: 50%; background: var(--amber); border: none; cursor: pointer; }

.controls { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
.ctrl { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 13px; padding: 4px 5px; transition: color 0.12s; display: flex; align-items: center; }
.ctrl:hover { color: var(--text-hi); }
.ctrl.play { width: 32px; height: 32px; background: var(--amber); color: #0b0a08; font-size: 12px; transition: background 0.12s; flex-shrink: 0; }
.ctrl.play:hover { background: var(--amber-pale); }

.toggle-video {
  font-size: 6px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-dim); border: 1px solid var(--border);
  padding: 4px 7px; background: none; cursor: pointer; transition: all 0.15s;
  font-family: var(--font-mono); flex-shrink: 0;
}
.toggle-video:hover { color: var(--amber); border-color: var(--amber-dim); }
.toggle-video.on { color: var(--amber); border-color: var(--amber); background: rgba(200,148,58,0.07); }

/* scrollbar */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); }

/* ── MOBILE CHIPS ────────────────────────────────────────────────── */
@media (min-width: 601px) { #genre-chips { display: none; } }
#genre-chips {
  display: flex; overflow-x: auto; gap: 5px; padding: 7px 10px;
  border-bottom: 1px solid var(--border); background: var(--surface);
  flex-shrink: 0; -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
#genre-chips::-webkit-scrollbar { display: none; }
.genre-chip {
  font-family: var(--font-mono); font-size: 8px; letter-spacing: 0.16em;
  text-transform: uppercase; padding: 4px 8px; border: 1px solid var(--border);
  background: none; color: var(--text-dim); cursor: pointer; white-space: nowrap;
  transition: all 0.12s; flex-shrink: 0;
}
.genre-chip.active { color: #000; border-color: transparent; }

/* ── MOBILE ──────────────────────────────────────────────────────── */
@media (max-width: 600px) {
  :root { --player-h: 56px; --vid-w: 100%; }
  .mast-clock, .mast-right, .mast-on-air { display: none; }
  .mast-search { max-width: none; }
  #sidebar { display: none; }
  #tile-grid { grid-template-columns: repeat(2, 1fr); }
  .list-header, .list-row { grid-template-columns: 26px 1fr 50px; }
  .list-header > *:nth-child(4), .list-header > *:nth-child(5),
  .list-row > *:nth-child(4), .list-row > *:nth-child(5) { display: none; }
  .chart-top { grid-template-columns: 1fr; }
  .chart-breakdown { display: none; }
  .progress-wrap { width: 110px; }
  .prog-time { display: none; }
  .vol-wrap { display: none; }
  /* video panel on mobile — sits above player bar, full width */
  #vid-panel {
    position: fixed; bottom: var(--player-h); left: 0; right: 0;
    width: 100%; height: 56vw; z-index: 90;
    border-left: none; border-top: 1px solid var(--border-hi);
  }
  /* push app bottom up when video is showing on mobile */
  #app.vid-mobile { bottom: calc(var(--player-h) + 56vw); }
  #vid-info { display: none; }
}
</style>
</head>

//  SESSION PLAY TRACKING (local fallback for chart)
// ══════════════════════════════════════════════════════════════════
let playCounts={}, playHistory=[];
function loadSession(){try{playCounts=JSON.parse(sessionStorage.getItem('ftp_counts')||'{}');playHistory=JSON.parse(sessionStorage.getItem('ftp_history')||'[]');}catch(e){}}
function saveSession(){try{sessionStorage.setItem('ftp_counts',JSON.stringify(playCounts));sessionStorage.setItem('ftp_history',JSON.stringify(playHistory));}catch(e){}}
function recordPlay(idx){
  const t=TRACKS[idx];
  playCounts[idx]=(playCounts[idx]||0)+1;
  playHistory.unshift({idx,playedAt:Date.now(),title:t.title,artist:t.artist,genre:t.genre,id:t.id});
  if(playHistory.length>100)playHistory.length=100;
  saveSession();
  if(typeof FTP_ANALYTICS!=='undefined') FTP_ANALYTICS.play(t,'catalogue');
  if(activeView==='chart') renderChart();
}
loadSession();

async function tbFetch(pipe) {
  const res = await fetch(`${TB_HOST}/v0/pipes/${pipe}.json?token=${TB_READ_TOK}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const j = await res.json();
  return j.data || [];
}

// Match Tinybird video_id back to a TRACKS index
function trackIdxFromVideoId(videoId) {
  return TRACKS.findIndex(t => t.id === videoId);
}

function fmtDur(s){if(!s||s<=0)return'--:--';const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;return h?`${h}:${pad(m)}:${pad(ss)}`:`${m}:${pad(ss)}`;}
function pad(n){return String(n).padStart(2,'0');}
function fmtTime(ts){const d=new Date(ts);return`${pad(d.getHours())}:${pad(d.getMinutes())}`;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ytThumb(id,q){return`https://i.ytimg.com/vi/${id}/${q||'mqdefault'}.jpg`;}
function getFiltered(){
  let a=TRACKS.map((t,i)=>({t,i}));
  if(activeGenre!=='ALL')a=a.filter(({t})=>t.genre===activeGenre);
  if(searchTerm){const q=searchTerm.toLowerCase();a=a.filter(({t})=>t.title.toLowerCase().includes(q)||t.artist.toLowerCase().includes(q));}
  if(sortBy==='az')  a.sort((a,b)=>a.t.artist.localeCompare(b.t.artist));
  if(sortBy==='dur') a.sort((a,b)=>(b.t.end-b.t.start)-(a.t.end-a.t.start));
  if(sortBy==='plays')a.sort((a,b)=>(playCounts[b.i]||0)-(playCounts[a.i]||0));
  return a;
}

// Text scale
const SCALES = [0.85, 1, 1.15, 1.3];
let scaleIdx = 1;
function applyScale(idx) {
  scaleIdx = Math.max(0, Math.min(SCALES.length-1, idx));
  textScale = SCALES[scaleIdx];
  document.documentElement.style.setProperty('--txt-scale', textScale);
}
document.getElementById('btn-scale-down').addEventListener('click', () => applyScale(scaleIdx-1));
document.getElementById('btn-scale-up').addEventListener('click',   () => applyScale(scaleIdx+1));

// Theme
document.getElementById('btn-theme').addEventListener('click', () => {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('btn-theme').textContent = isDark ? 'LIGHT' : 'DARK';
});

// Volume
const volSlider = document.getElementById('vol-slider');
const volIcon   = document.getElementById('vol-icon');
volSlider.addEventListener('input', () => {
  currentVolume = parseInt(volSlider.value);
  if (ytPlayer?.setVolume) ytPlayer.setVolume(currentVolume);
  volIcon.textContent = currentVolume === 0 ? '🔇' : currentVolume < 50 ? '🔉' : '🔊';
});
volIcon.addEventListener('click', () => {
  currentVolume = currentVolume > 0 ? 0 : 80;
  volSlider.value = currentVolume;
  if (ytPlayer?.setVolume) ytPlayer.setVolume(currentVolume);
  volIcon.textContent = currentVolume === 0 ? '🔇' : '🔊';
});

function buildSidebar() {
  const gc2={};TRACKS.forEach(t=>gc2[t.genre]=(gc2[t.genre]||0)+1);
  const sb=document.getElementById('sidebar');
  let h='<div class="sb-label">Genre</div>';
  h+=`<button class="sb-btn active" data-genre="ALL"><span class="sb-dot" style="background:#888"></span>All<span class="sb-count">${TRACKS.length}</span></button>`;
  Object.keys(GENRE_META).filter(g=>g!=='ALL').forEach(g=>{
    if(!gc2[g])return;
    h+=`<button class="sb-btn" data-genre="${g}"><span class="sb-dot" style="background:${GENRE_META[g].color}"></span>${GENRE_META[g].label}<span class="sb-count">${gc2[g]}</span></button>`;
  });
  h+='<div class="sb-divider"></div><div class="sb-label">Sort</div>';
  [['default','Default'],['az','Artist A–Z'],['dur','Duration'],['plays','Most Played']].forEach(([v,l])=>{
    h+=`<button class="sb-sort-btn${v==='default'?' active':''}" data-sort="${v}">${l}</button>`;
  });
  sb.innerHTML=h;
  sb.querySelectorAll('.sb-btn').forEach(b=>b.addEventListener('click',()=>{
    setGenre(b.dataset.genre);
    sb.querySelectorAll('.sb-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
  }));
  sb.querySelectorAll('.sb-sort-btn').forEach(b=>b.addEventListener('click',()=>{
    sortBy=b.dataset.sort;
    sb.querySelectorAll('.sb-sort-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');render();
  }));
  // chips
  const chips=document.getElementById('genre-chips');
  let ch=`<button class="genre-chip active" data-genre="ALL">All</button>`;
  Object.keys(GENRE_META).filter(g=>g!=='ALL').forEach(g=>{
    if(!gc2[g])return;
    ch+=`<button class="genre-chip" data-genre="${g}">${GENRE_META[g].label}</button>`;
  });
  chips.innerHTML=ch;
  chips.querySelectorAll('.genre-chip').forEach(b=>b.addEventListener('click',()=>{
    setGenre(b.dataset.genre);
    chips.querySelectorAll('.genre-chip').forEach(x=>{x.classList.remove('active');x.style.background='';x.style.color='';});
    b.classList.add('active');
    b.style.background=b.dataset.genre==='ALL'?'#888':gc(b.dataset.genre);
    b.style.color='#000';
  }));
}

function setGenre(g){
  activeGenre=g;
  document.querySelectorAll('#sidebar .sb-btn').forEach(b=>b.classList.toggle('active',b.dataset.genre===g));
  render();
}

// ══════════════════════════════════════════════════════════════════
//  VIEW SWITCHING
// ══════════════════════════════════════════════════════════════════
document.querySelectorAll('.view-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    activeView=tab.dataset.view;
    document.querySelectorAll('.view-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tile-view').style.display  = activeView==='tiles'?'block':'none';
    document.getElementById('list-view').style.display  = activeView==='list' ?'block':'none';
    document.getElementById('chart-view').style.display = activeView==='chart'?'block':'none';
    if(activeView==='chart') renderChart();
  });
});

// ══════════════════════════════════════════════════════════════════
//  RENDER TILES
// ══════════════════════════════════════════════════════════════════
function renderTiles(items){
  const grid=document.getElementById('tile-grid');
  const noRes=document.getElementById('no-results-tiles');
  if(!items.length){grid.innerHTML='';noRes.style.display='block';return;}
  noRes.style.display='none';
  grid.innerHTML=items.map(({t,i})=>{
    const dur=t.end>t.start?fmtDur(t.end-t.start):'';
    const pc=playCounts[i]||0;
    return`<div class="tile${i===currentIdx?' playing':''}" data-idx="${i}">
      <div class="tile-thumb">
        <img class="tile-thumb-img" src="${ytThumb(t.id)}" loading="lazy" alt=""
             onerror="this.style.display='none';this.parentElement.querySelector('.tile-thumb-fb').style.display='flex'">
        <img class="tile-thumb-live" alt="">
        <div class="tile-thumb-fb" style="display:none">${t.genre}</div>
        <span class="tile-genre" style="background:${gc(t.genre)}">${t.genre}</span>
        <span class="tile-playing-badge">ON AIR</span>
        <div class="tile-np">
          ${pc?`<div class="tile-np-label">${pc}×</div>`:''}
          <div class="tile-np-title">${esc(t.song||t.title)}</div>
        </div>
      </div>
      <div class="tile-meta">
        <div class="tile-title">${esc(t.artist)}</div>
        <div class="tile-artist">${esc(t.song)}</div>
        ${dur?`<div class="tile-dur">${dur}</div>`:''}
      </div>
    </div>`;
  }).join('');
  grid.querySelectorAll('.tile').forEach(tile=>{
    const idx=parseInt(tile.dataset.idx);
    let liveLoaded=false;
    const liveImg=tile.querySelector('.tile-thumb-live');
    tile.addEventListener('mouseenter',()=>{
      if(liveLoaded)return;liveLoaded=true;
      const img=new Image();
      img.onload=()=>{liveImg.src=img.src;liveImg.classList.add('ready');};
      img.onerror=()=>{const i2=new Image();i2.onload=()=>{liveImg.src=i2.src;liveImg.classList.add('ready');};i2.src=ytThumb(TRACKS[idx].id,'hqdefault');};
      img.src=ytThumb(TRACKS[idx].id,'maxresdefault');
    });
    tile.addEventListener('click',()=>playTrack(idx));
  });
}

// ══════════════════════════════════════════════════════════════════
//  RENDER LIST
// ══════════════════════════════════════════════════════════════════
function renderList(items){
  const cont=document.getElementById('list-rows');
  const noRes=document.getElementById('no-results-list');
  if(!items.length){cont.innerHTML='';noRes.style.display='block';return;}
  noRes.style.display='none';
  cont.innerHTML=items.map(({t,i},n)=>{
    const dur=t.end>t.start?fmtDur(t.end-t.start):'--';
    return`<div class="list-row${i===currentIdx?' playing':''}" data-idx="${i}">
      <div class="list-row-num">
        <span class="list-row-num-inner">${n+1}</span>
        <div class="playing-eq"><span></span><span></span><span></span></div>
      </div>
      <div class="list-row-info">
        <div class="list-row-title">${esc(t.title)}</div>
        <div class="list-row-artist">${esc(t.artist)}</div>
      </div>
      <div><span class="list-genre-tag" style="background:${gc(t.genre)}">${t.genre}</span></div>
      <div class="list-row-dur">${dur}</div>
      <div><a class="list-yt-link" href="https://www.youtube.com/watch?v=${t.id}&t=${t.start}" target="_blank" onclick="event.stopPropagation()">▶ YT</a></div>
    </div>`;
  }).join('');
  cont.querySelectorAll('.list-row').forEach(r=>r.addEventListener('click',()=>playTrack(parseInt(r.dataset.idx))));
}

// ══════════════════════════════════════════════════════════════════
//  RENDER CHART — Tinybird first, session fallback
// ══════════════════════════════════════════════════════════════════
async function renderChart() {
  const listEl    = document.getElementById('chart-list');
  const badge     = document.getElementById('chart-badge');
  const breakEl   = document.getElementById('chart-breakdown');
  const timelineEl= document.getElementById('timeline-entries');
  const histCount = document.getElementById('history-count');

  listEl.innerHTML = '<div class="chart-loading">Loading…</div>';

  // Genre breakdown always from local data
  const genreCounts={};TRACKS.forEach(t=>genreCounts[t.genre]=(genreCounts[t.genre]||0)+1);
  const maxG=Math.max(...Object.values(genreCounts),1);
  breakEl.innerHTML=`<div class="breakdown-title">Genre Mix</div>`+
    Object.entries(genreCounts).sort((a,b)=>b[1]-a[1]).map(([g,c])=>{
      const col=gc(g),pct=Math.round((c/maxG)*100);
      return`<div class="breakdown-row">
        <div class="breakdown-genre-label">
          <span class="breakdown-name" style="color:${col}">${GENRE_META[g]?.label||g}</span>
          <span class="breakdown-count" style="color:${col}">${c}</span>
        </div>
        <div class="breakdown-bar-track"><div class="breakdown-bar-fill" style="width:${pct}%;background:${col}"></div></div>
      </div>`;
    }).join('');

  // Try Tinybird
  let usedTinybird = false;
  let ranked = [];

  try {
    let rows = tbChartData;
    if (!rows) {
      rows = await tbFetch('chart_scores');
      tbChartData = rows;
      setTimeout(()=>{tbChartData=null;},10*60*1000); // expire cache after 10min
    }

    if (rows && rows.length) {
      usedTinybird = true;
      badge.textContent = 'TINYBIRD LIVE';
      badge.style.borderColor = '';
      badge.style.color = '';

      if (chartPeriod === 'plays') {
        ranked = rows.sort((a,b)=>parseFloat(b.ftp_score||0)-parseFloat(a.ftp_score||0)).slice(0,15).map(r=>({
          videoId: r.video_id, title: r.title, artist: r.artist, genre: r.genre,
          cnt: parseInt(r.total_plays)||0, score: Math.round(parseFloat(r.ftp_score)||0),
          momentum: (()=>{const p7=parseInt(r.plays_7d)||0,p30=parseInt(r.plays_30d)||1;const ratio=p7/p30;return ratio>0.7?'↑':ratio<0.1?'↓':'—';})()
        }));
      } else if (chartPeriod === 'recent') {
        const recent = await tbFetch('recent_plays');
        const seen=new Set();
        ranked = recent.filter(r=>{if(seen.has(r.video_id))return false;seen.add(r.video_id);return true;})
          .slice(0,15).map(r=>({videoId:r.video_id,title:r.title,artist:r.artist,genre:r.genre,cnt:0,score:0,momentum:'—'}));
      } else {
        // by genre — top score per genre
        const byGenre={};
        rows.forEach(r=>{if(!byGenre[r.genre]||parseFloat(r.ftp_score||0)>parseFloat(byGenre[r.genre].ftp_score||0))byGenre[r.genre]=r;});
        ranked=Object.values(byGenre).sort((a,b)=>parseFloat(b.ftp_score||0)-parseFloat(a.ftp_score||0))
          .map(r=>({videoId:r.video_id,title:r.title,artist:r.artist,genre:r.genre,cnt:parseInt(r.total_plays)||0,score:Math.round(parseFloat(r.ftp_score)||0),momentum:'—'}));
      }
    }
  } catch(e) {
    console.warn('[catalogue] Tinybird fetch failed:', e.message);
  }

  // Fallback to session data
  if (!usedTinybird || !ranked.length) {
    badge.textContent = 'SESSION DATA';
    badge.style.borderColor = 'var(--border)';
    badge.style.color = 'var(--text-dim)';
    const entries=Object.entries(playCounts).sort((a,b)=>b[1]-a[1]).slice(0,15);
    if(entries.length){
      ranked=entries.map(([idx,cnt])=>{const t=TRACKS[parseInt(idx)];return{videoId:t?.id,title:t?.title,artist:t?.artist,genre:t?.genre,cnt,score:cnt,momentum:'—'};}).filter(r=>r.videoId);
    } else {
      ranked=TRACKS.slice(0,10).map(t=>({videoId:t.id,title:t.title,artist:t.artist,genre:t.genre,cnt:0,score:0,momentum:'—'}));
    }
  }

  // Render ranked list
  listEl.innerHTML = ranked.map((r,n)=>{
    const hasPlays=r.cnt>0||r.score>0;
    const momClass=r.momentum==='↑'?'up':r.momentum==='↓'?'down':'same';
    return`<div class="chart-row${r.videoId===TRACKS[currentIdx]?.id?' playing':''}" data-video-id="${r.videoId||''}">
      <div class="chart-rank${n<3?' top3':''}">${n+1}</div>
      <img class="chart-thumb-sm" src="${ytThumb(r.videoId)}" loading="lazy" alt="" onerror="this.style.display='none'">
      <div class="chart-info">
        <div class="chart-info-title">${esc(r.artist)}</div>
        <div class="chart-info-sub">${esc(r.title)}</div>
      </div>
      <div class="chart-plays">${hasPlays?`<strong>${usedTinybird?r.score:r.cnt}</strong>${usedTinybird?'pts':'×'}':'<span style="color:var(--text-lo)">—</span>'}</div>
      <div class="chart-move ${momClass}">${r.momentum}</div>
    </div>`;
  }).join('');

  listEl.querySelectorAll('.chart-row').forEach(row=>{
    row.addEventListener('click',()=>{
      const vid=row.dataset.videoId;
      const idx=TRACKS.findIndex(t=>t.id===vid);
      if(idx>=0) playTrack(idx);
    });
  });

  // Recent plays timeline — try Tinybird recent_plays, fall back to session
  let timelineRows = [];
  try {
    if (usedTinybird) {
      const recent = await tbFetch('recent_plays');
      timelineRows = recent.slice(0,20).map(r=>({
        id:r.video_id, title:r.title, artist:r.artist, genre:r.genre,
        playedAt: new Date(r.ts.replace(' ','T')+'Z').getTime()
      }));
    }
  } catch(e){}

  if (!timelineRows.length) timelineRows = playHistory.slice(0,20).map(h=>({id:h.id,title:h.title,artist:h.artist,genre:h.genre,playedAt:h.playedAt}));

  histCount.textContent = timelineRows.length ? `${timelineRows.length} plays` : '—';

  if (!timelineRows.length) {
    timelineEl.innerHTML=`<div style="padding:14px 10px;font-size:9px;color:var(--text-lo);letter-spacing:0.18em;text-transform:uppercase">No plays recorded yet</div>`;
  } else {
    timelineEl.innerHTML=timelineRows.map(h=>`<div class="timeline-entry" data-id="${h.id}">
      <div class="timeline-time">${fmtTime(h.playedAt)}</div>
      <img class="timeline-thumb" src="${ytThumb(h.id)}" loading="lazy" alt="" onerror="this.style.display='none'">
      <div class="timeline-info">
        <div class="timeline-title">${esc(h.title)}</div>
        <div class="timeline-artist">${esc(h.artist)}</div>
      </div>
      <span class="timeline-tag" style="background:${gc(h.genre)}">${h.genre}</span>
    </div>`).join('');
    timelineEl.querySelectorAll('.timeline-entry').forEach(e=>{
      e.addEventListener('click',()=>{const idx=TRACKS.findIndex(t=>t.id===e.dataset.id);if(idx>=0)playTrack(idx);});
    });
  }
}

document.querySelectorAll('.chart-period-btn').forEach(b=>b.addEventListener('click',()=>{
  chartPeriod=b.dataset.period;
  document.querySelectorAll('.chart-period-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  tbChartData=null; // force re-fetch on period change
  renderChart();
}));

// ══════════════════════════════════════════════════════════════════
//  MAIN RENDER
// ══════════════════════════════════════════════════════════════════
function render(){
  filteredIdxs=getFiltered();
  document.getElementById('tab-count').textContent=filteredIdxs.length;
  document.getElementById('hs-stats').textContent=`${filteredIdxs.length} / ${TRACKS.length}`;
  renderTiles(filteredIdxs);
  renderList(filteredIdxs);
  if(activeView==='chart')renderChart();
}

// ══════════════════════════════════════════════════════════════════
//  PLAYBACK
// ══════════════════════════════════════════════════════════════════
function playTrack(idx){
  if(idx<0||idx>=TRACKS.length)return;
  const t=TRACKS[idx];
  currentIdx=idx; isPlaying=true;
  recordPlay(idx);

  // Player bar
  const wrap=document.getElementById('player-thumb-wrap');
  wrap.innerHTML=`<img class="player-thumb-img" src="${ytThumb(t.id)}" onerror="this.src='${ytThumb(t.id,'hqdefault')}'" alt="">`;
  document.getElementById('player-title').innerHTML=`<span class="player-genre-dot" style="background:${gc(t.genre)}"></span>${esc(t.title)}`;
  document.getElementById('player-artist').textContent=t.artist;
  document.getElementById('prog-dur').textContent=fmtDur(Math.max(0,t.end-t.start));
  document.getElementById('prog-cur').textContent='0:00';
  document.getElementById('prog-fill').style.width='0%';
  document.getElementById('btn-play').textContent='⏸';

  // Video info panel
  document.getElementById('vid-info-title').textContent=t.title;
  document.getElementById('vid-info-artist').textContent=t.artist;

  ensureYT(()=>{
    if(!ytPlayer) buildYTPlayer(t);
    else{ytPlayer.loadVideoById({videoId:t.id,startSeconds:t.start,endSeconds:t.end||undefined});ytPlayer.playVideo();}
    ytPlayer && ytPlayer.setVolume(currentVolume);
  });

  startProgress(t);
  render();
}

function ensureYT(cb){
  if(ytReady){cb();return;}
  if(!ytApiLoading){ytApiLoading=true;const s=document.createElement('script');s.src='https://www.youtube.com/iframe_api';document.head.appendChild(s);}
  const w=setInterval(()=>{if(ytReady){clearInterval(w);cb();}},100);
}
window.onYouTubeIframeAPIReady=()=>{ytReady=true;};

function buildYTPlayer(t){
  // Size: oversized to bleed beyond masks — eliminates letterbox
  const inner=document.getElementById('yt-inner');
  inner.innerHTML='';
  const div=document.createElement('div');div.id='yt-p';inner.appendChild(div);
  ytPlayer=new YT.Player('yt-p',{
    width:'320',height:'260',videoId:t.id,
    playerVars:{
      start:t.start,end:t.end||undefined,
      autoplay:1,
      controls:0,         // no YT controls
      rel:0,modestbranding:1,
      disablekb:1,        // no keyboard hijack
      iv_load_policy:3,   // no annotations
      fs:0,               // no fullscreen button
      playsinline:1,
    },
    events:{
      onReady(e){e.target.setVolume(currentVolume);},
      onStateChange(e){
        if(e.data===YT.PlayerState.ENDED)  onTrackEnd();
        if(e.data===YT.PlayerState.PLAYING){isPlaying=true;  document.getElementById('btn-play').textContent='⏸';}
        if(e.data===YT.PlayerState.PAUSED) {isPlaying=false; document.getElementById('btn-play').textContent='▶';}
      }
    }
  });
}

function onTrackEnd(){
  const fi=filteredIdxs.findIndex(({i})=>i===currentIdx);
  if(fi>=0&&fi<filteredIdxs.length-1)playTrack(filteredIdxs[fi+1].i);
}

function startProgress(t){
  clearInterval(progInterval);
  const dur=Math.max(0,t.end-t.start);if(!dur)return;
  progInterval=setInterval(()=>{
    if(!ytPlayer||!isPlaying)return;
    try{
      const cur=Math.max(0,ytPlayer.getCurrentTime()-t.start);
      document.getElementById('prog-fill').style.width=Math.min(100,(cur/dur)*100)+'%';
      document.getElementById('prog-cur').textContent=fmtDur(Math.floor(cur));
    }catch(e){}
  },500);
}

// Controls
document.getElementById('btn-play').addEventListener('click',()=>{if(!ytPlayer)return;isPlaying?ytPlayer.pauseVideo():ytPlayer.playVideo();});
document.getElementById('btn-prev').addEventListener('click',()=>{const fi=filteredIdxs.findIndex(({i})=>i===currentIdx);if(fi>0)playTrack(filteredIdxs[fi-1].i);});
document.getElementById('btn-next').addEventListener('click',()=>{const fi=filteredIdxs.findIndex(({i})=>i===currentIdx);if(fi>=0&&fi<filteredIdxs.length-1)playTrack(filteredIdxs[fi+1].i);});
document.getElementById('prog-track').addEventListener('click',e=>{
  if(!ytPlayer||currentIdx<0)return;
  const t=TRACKS[currentIdx];
  const pct=(e.clientX-e.currentTarget.getBoundingClientRect().left)/e.currentTarget.offsetWidth;
  ytPlayer.seekTo(t.start+pct*(t.end-t.start),true);
});

// Video panel toggle
document.getElementById('toggle-video').addEventListener('click',()=>{
  videoOn=!videoOn;
  document.getElementById('vid-panel').classList.toggle('on',videoOn);
  document.getElementById('toggle-video').classList.toggle('on',videoOn);
  // mobile: shift app bottom
  const isMobile=window.innerWidth<=600;
  document.getElementById('app').classList.toggle('vid-mobile',videoOn&&isMobile);
  if(videoOn)ensureYT(()=>{});
});

// Search
document.getElementById('search').addEventListener('input',e=>{searchTerm=e.target.value.trim();render();});

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.code==='Space'){e.preventDefault();document.getElementById('btn-play').click();}
  if(e.code==='ArrowRight')document.getElementById('btn-next').click();
  if(e.code==='ArrowLeft') document.getElementById('btn-prev').click();
  if(e.code==='ArrowUp'){currentVolume=Math.min(100,currentVolume+10);volSlider.value=currentVolume;if(ytPlayer?.setVolume)ytPlayer.setVolume(currentVolume);}
  if(e.code==='ArrowDown'){currentVolume=Math.max(0,currentVolume-10);volSlider.value=currentVolume;if(ytPlayer?.setVolume)ytPlayer.setVolume(currentVolume);}
});

// Clock
function tick(){const n=new Date();document.getElementById('clock').textContent=[n.getHours(),n.getMinutes(),n.getSeconds()].map(x=>String(x).padStart(2,'0')).join(':');}
setInterval(tick,1000);tick();

// ── INIT ───────────────────────────────────────────────────────────
buildSidebar();
document.getElementById('tile-view').style.display ='block';
document.getElementById('list-view').style.display ='none';
document.getElementById('chart-view').style.display='none';
render();
</script>
