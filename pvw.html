<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIDEO WON — CHANNEL GUIDE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,900;1,700&display=swap" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/dseg7-classic" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════════════════
   TOKENS
══════════════════════════════════════════════════════════════════ */
:root {
  --red:        #CC0000;
  --red-dim:    #660000;
  --red-glow:   rgba(204,0,0,0.15);
  --yellow:     #E8FF00;
  --black:      #111111;
  --white:      #F4F2EE;

  --bg:         #111111;
  --surface:    #1a1a1a;
  --surface-2:  #222222;
  --border:     #2e2e2e;
  --border-hi:  #444444;
  --text:       #b0a898;
  --text-dim:   #555555;
  --text-hi:    #F4F2EE;
  --text-lo:    #333333;

  --font-disp:  'Bebas Neue', 'Barlow Condensed', sans-serif;
  --font-mono:  'IBM Plex Mono', monospace;
  --font-cond:  'Barlow Condensed', sans-serif;
  --font-lcd:   'DSEG7 Classic', monospace;
}
[data-theme="light"] {
  --bg:        #F4F2EE;
  --surface:   #ECEAE4;
  --surface-2: #E2E0D8;
  --border:    #CCCCCC;
  --border-hi: #AAAAAA;
  --text:      #444444;
  --text-dim:  #999999;
  --text-hi:   #111111;
  --text-lo:   #CCCCCC;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  min-height: 100%; background: var(--bg); color: var(--text);
  font-family: var(--font-mono); font-size: 13px; line-height: 1.5; overflow-x: hidden;
  transition: background 0.2s, color 0.2s;
}
[data-theme="dark"] body::after {
  content: ''; position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='0.04'/%3E%3C/svg%3E");
  background-size: 256px; pointer-events: none; z-index: 999; mix-blend-mode: overlay;
}
[data-theme="dark"] body::before {
  content: ''; position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.05) 3px, rgba(0,0,0,0.05) 4px);
  pointer-events: none; z-index: 998;
}

/* ── CORNER THEME TOGGLE — always visible ───────────────────────── */
#theme-corner {
  position: fixed; top: 12px; right: 12px; z-index: 1000;
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--surface); border: 1px solid var(--border);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 12px; transition: all 0.15s; box-shadow: 0 2px 8px rgba(0,0,0,0.4);
}
#theme-corner:hover { border-color: var(--red); transform: scale(1.12); }

/* ── CHANNEL LOGO OVERRIDES ─────────────────────────────────────── */
.ch-card[data-ch-num="1"] .ch-thumb-fb-num {
  background-image: url(images/ftptv.png); font-size: 0;
}
.ch-card[data-ch-num="2"] .ch-thumb-fb-num {
  background-image: url(images/nooktv.png); font-size: 0;
}
.ch-card[data-ch-num="3"] .ch-thumb-fb-num {
  background-image: url(images/logo-S.png); font-size: 0;
}
.ch-card[data-ch-num="8"] .ch-thumb-fb-num {
  background-image: url(images/vw.png); font-size: 0;
  filter: invert(1) brightness(0.8);
}
.ch-thumb-fb-num {
  color: var(--text-lo); letter-spacing: -3px; line-height: 1;
  width: 80px; height: 80px;
  background-size: contain; background-repeat: no-repeat; background-position: center;
}

/* ── MASTHEAD ────────────────────────────────────────────────────── */
#masthead {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: stretch;
  background: var(--black);
  border-bottom: 3px solid var(--red);
  height: 80px;
}
.mast-logo-cell {
  display: flex; align-items: center; justify-content: center;
  padding: 8px 18px; border-right: 1px solid #333; flex-shrink: 0;
}
.mast-logo-cell img {
  height: 54px; width: auto; display: block;
  filter: brightness(0.92) contrast(1.05);
  animation: logoPulse 4s ease-in-out infinite;
}
@keyframes logoPulse {
  0%,100% { transform: scale(1); }
  50%     { transform: scale(1.04); }
}
/* VIDEO WON wordmark fallback if no image */
.mast-logo-text {
  font-family: var(--font-disp); font-size: 28px; color: var(--white); letter-spacing: 0.1em;
}
.mast-logo-text span { color: var(--red); }

.mast-center {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 18px;
}
.mast-on-air {
  display: flex; align-items: center; gap: 5px;
  background: var(--red); padding: 3px 9px;
}
.on-air-dot { width: 5px; height: 5px; border-radius: 50%; background: #fff; animation: dot-blink 1.1s step-end infinite; }
@keyframes dot-blink { 0%,100%{opacity:1} 50%{opacity:0} }
.on-air-text { font-family: var(--font-cond); font-weight: 700; font-size: 8px; letter-spacing: 0.28em; color: #fff; text-transform: uppercase; }

#clock {
  font-family: var(--font-lcd); font-size: 1.6rem;
  color: var(--red); letter-spacing: 0.06em;
  text-shadow: 0 0 8px rgba(204,0,0,0.55), 0 0 16px rgba(204,0,0,0.25);
  position: relative;
}
#clock::before {
  content: attr(data-ghost); position: absolute; inset: 0;
  color: rgba(204,0,0,0.12); pointer-events: none;
}

.mast-right {
  display: flex; align-items: center; padding: 0 18px;
  border-left: 1px solid #333; flex-shrink: 0; gap: 12px;
}
.mast-btn {
  font-family: var(--font-cond); font-weight: 700; font-size: 9px;
  letter-spacing: 0.22em; color: #555; text-transform: uppercase;
  text-decoration: none; transition: color 0.12s; white-space: nowrap;
}
.mast-btn:hover { color: var(--white); }

/* ── HERO STRIP ──────────────────────────────────────────────────── */
#hero-strip {
  border-bottom: 1px solid var(--border); background: var(--surface);
  padding: 6px 20px; display: flex; align-items: center; gap: 12px; min-height: 34px;
}
.hs-ch {
  font-family: var(--font-cond); font-weight: 700; font-size: 8px;
  letter-spacing: 0.35em; color: var(--red); text-transform: uppercase;
  white-space: nowrap; flex-shrink: 0; border: 1px solid var(--red); padding: 1px 5px;
}
.hs-track {
  font-family: var(--font-disp); font-size: 1.2rem; color: var(--text-hi);
  letter-spacing: 0.05em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
}
.hs-ctx { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); letter-spacing: 0.1em; white-space: nowrap; flex-shrink: 0; }

/* ── MAIN ────────────────────────────────────────────────────────── */
#main { padding: 20px; max-width: 1400px; margin: 0 auto; padding-bottom: 40px; }
.section-head {
  display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px;
  padding-bottom: 7px; border-bottom: 1px solid var(--border);
}
.section-head-label {
  font-family: var(--font-cond); font-weight: 700; font-size: 8px;
  letter-spacing: 0.4em; color: var(--text-dim); text-transform: uppercase;
}

/* ── CHANNEL GRID ────────────────────────────────────────────────── */
#channel-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 1px; background: var(--border); border: 1px solid var(--border);
}

/* ── CHANNEL CARD ────────────────────────────────────────────────── */
.ch-card {
  background: var(--surface); display: block; text-decoration: none; color: inherit;
  position: relative; cursor: pointer; outline: none;
  border-left: 3px solid transparent; transition: background 0.1s, border-color 0.1s;
}
.ch-card:hover    { background: var(--surface-2); border-left-color: #555; }
.ch-card.featured { background: var(--surface-2); border-left-color: var(--red); }
.ch-card:focus-visible { outline: 2px solid var(--red); outline-offset: -2px; }

/* ── THUMB ───────────────────────────────────────────────────────── */
.ch-thumb {
  position: relative; width: 100%; padding-top: 56.25%;
  background: #000; overflow: hidden;
  border-radius: 4px; margin: 8px; width: calc(100% - 16px); padding-top: calc(56.25% - 9px);
}
.ch-thumb-static {
  position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block;
  filter: saturate(0.5) brightness(0.75) contrast(1.08);
  transition: opacity 0.28s, filter 0.28s;
}
.ch-card:hover .ch-thumb-static { filter: saturate(0.8) brightness(0.85); }
.ch-thumb-live {
  position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
  opacity: 0; transition: opacity 0.3s;
}
.ch-card:hover .ch-thumb-live.ready { opacity: 1; }
.ch-card:hover .ch-thumb-static { opacity: 0; }
.ch-thumb-fb {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #111 0%, #1a1a1a 100%); z-index: -1;
}
.ch-thumb::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(0deg, rgba(10,10,10,0.85) 0%, transparent 55%);
  pointer-events: none; z-index: 2;
}

/* ── BADGES ──────────────────────────────────────────────────────── */
.ch-live {
  position: absolute; top: 7px; left: 8px; z-index: 3;
  display: flex; align-items: center; gap: 4px;
  background: var(--red); padding: 2px 7px;
  font-family: var(--font-cond); font-weight: 700; font-size: 7px;
  letter-spacing: 0.22em; color: #fff; text-transform: uppercase;
}
.ch-live::before { content: ''; width: 4px; height: 4px; border-radius: 50%; background: #fff; animation: blink 1.1s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.ch-live.off { display: none; }
.ch-num-overlay {
  position: absolute; bottom: 7px; right: 9px; z-index: 3;
  font-family: var(--font-disp); font-size: 15px; color: rgba(255,255,255,0.18);
  letter-spacing: 0.05em; pointer-events: none;
}
.ch-on-air {
  position: absolute; top: 7px; right: 8px; z-index: 3;
  font-family: var(--font-cond); font-weight: 700; font-size: 7px; letter-spacing: 0.18em;
  color: #fff; background: var(--red); padding: 2px 6px; text-transform: uppercase; display: none;
  animation: badge-pulse 1.4s ease-in-out infinite;
}
@keyframes badge-pulse { 0%,100%{opacity:1} 50%{opacity:0.65} }
.ch-card.featured .ch-on-air { display: block; }

/* ── NOW PLAYING OVERLAY ─────────────────────────────────────────── */
.ch-np { position: absolute; bottom: 0; left: 0; right: 0; z-index: 4; padding: 6px 9px 7px; pointer-events: none; }
.ch-np-label {
  font-family: var(--font-cond); font-weight: 700; font-size: 7px;
  letter-spacing: 0.28em; color: rgba(204,0,0,0.8); text-transform: uppercase;
  line-height: 1; margin-bottom: 2px;
}
.ch-np-text {
  font-family: var(--font-disp); font-size: 15px; color: rgba(244,242,238,0.92);
  letter-spacing: 0.04em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.1;
}
.ch-np-text.loading { color: rgba(255,255,255,0.18); font-size: 11px; letter-spacing: 0.2em; }
.ch-np-text.error   { color: rgba(255,255,255,0.12); font-size: 11px; letter-spacing: 0.15em; }

/* ── VOTE BUTTON ─────────────────────────────────────────────────── */
.ch-vote {
  position: absolute; bottom: 8px; right: 8px; z-index: 5;
  width: 28px; height: 28px; border-radius: 2px;
  background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.5); font-size: 12px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.12s;
  font-family: var(--font-cond); font-weight: 700;
}
.ch-vote:hover { border-color: var(--red); color: var(--red); background: var(--red-glow); }
.ch-vote.voted { border-color: var(--red); color: var(--red); background: var(--red-glow); }
.ch-vote-count {
  position: absolute; bottom: 38px; right: 8px; z-index: 5;
  font-family: var(--font-lcd); font-size: 0.75rem; color: var(--red);
  text-shadow: 0 0 5px rgba(204,0,0,0.5); pointer-events: none;
  display: none;
}
.ch-vote.voted + .ch-vote-count { display: block; }

/* ── CARD META ───────────────────────────────────────────────────── */
.ch-meta {
  padding: 8px 12px 10px; display: grid;
  grid-template-columns: 32px 1fr; gap: 0 10px; align-items: start;
}
.ch-num {
  font-family: var(--font-disp); font-size: 26px; color: var(--text-lo);
  line-height: 1; padding-top: 2px; text-align: right; transition: color 0.1s;
}
.ch-card:hover .ch-num, .ch-card.featured .ch-num { color: var(--red); }
.ch-name {
  font-family: var(--font-cond); font-weight: 700; font-size: 13px;
  letter-spacing: 0.08em; color: var(--text-hi); text-transform: uppercase; line-height: 1.2;
}
.ch-desc {
  font-family: var(--font-mono); font-size: 9px; color: var(--text-dim);
  margin-top: 2px; letter-spacing: 0.04em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.ch-tag {
  display: inline-block; margin-top: 4px;
  font-family: var(--font-cond); font-weight: 700; font-size: 7px; letter-spacing: 0.2em;
  color: #000; background: var(--red);
  padding: 1px 6px; text-transform: uppercase;
  clip-path: polygon(4px 0%, 100% 0%, calc(100% - 4px) 100%, 0% 100%);
}

/* ── FOOTER ──────────────────────────────────────────────────────── */
#footer {
  border-top: 1px solid var(--border); padding: 10px 20px;
  display: flex; align-items: center; justify-content: space-between;
  background: var(--black); margin-top: 28px;
  border-top: 3px solid var(--red);
}
.footer-sig {
  font-family: var(--font-cond); font-weight: 700; font-size: 8px;
  letter-spacing: 0.28em; color: var(--text-dim); text-transform: uppercase;
}
.footer-wordmark {
  font-family: var(--font-disp); font-size: 1.4rem; color: var(--text-lo); letter-spacing: 0.1em;
}
.footer-wordmark span { color: var(--red); }

@media (max-width: 700px) {
  #channel-grid { grid-template-columns: 1fr 1fr; }
  #main { padding: 10px; }
  .mast-center { gap: 10px; }
  #clock { font-size: 1.2rem; }
}
@media (max-width: 440px) {
  #channel-grid { grid-template-columns: 1fr; }
  .mast-center { display: none; }
}
</style>
</head>

// ══════════════════════════════════════════════════════════════════
//  LIVE POSITION ENGINE
// ══════════════════════════════════════════════════════════════════
function getLivePosition(playlist) {
  const total  = playlist.reduce((s,t) => s + Math.max(0, t.end - t.start), 0);
  if (!total) return { index: 0 };
  const nowSec = Math.floor(Date.now() / 1000);
  const dayNum = Math.floor(nowSec / 86400);
  const seed   = Number((BigInt(dayNum % total) * 3571n) % BigInt(total));
  const pos    = ((nowSec % total) + seed) % total;
  let elapsed  = 0;
  for (let i = 0; i < playlist.length; i++) {
    const len = playlist[i].end - playlist[i].start;
    if (pos < elapsed + len) return { index: i, seekOffset: pos - elapsed };
    elapsed += len;
  }
  return { index: 0, seekOffset: 0 };
}

function parseTitle(title) {
  const sep   = title.includes('—') ? '—' : ' - ';
  const parts = title.split(sep);
  return {
    artist:  parts[0].trim(),
    context: parts.slice(1).join(sep).replace(/\[.*?\]/g,'').replace(/#\w+/g,'').trim(),
  };
}

function playlistNowPlaying(playlist) {
  const { index } = getLivePosition(playlist);
  const track     = playlist[index];
  if (!track) return { text: '—', videoId: null };
  const p = parseTitle(track.title);
  return {
    text:    p.artist + (p.context ? ' — ' + p.context : ''),
    videoId: track.id,
  };
}

// ══════════════════════════════════════════════════════════════════
//  REMOTE PLAYLIST FETCH
// ══════════════════════════════════════════════════════════════════
const _cache = {};
async function fetchRemotePlaylist(url, varName) {
  if (_cache[url]) return _cache[url];
  try {
    const res  = await fetch(url, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const fn   = new Function(`${text}; return typeof ${varName} !== 'undefined' ? ${varName} : null;`);
    const arr  = fn();
    if (!Array.isArray(arr) || !arr.length) throw new Error('No array found');
    _cache[url] = arr;
    return arr;
  } catch (e) {
    console.warn(`[portal] fetchRemotePlaylist(${url}):`, e.message);
    return null;
  }
}

// ══════════════════════════════════════════════════════════════════
//  RESOLVE NOW PLAYING
// ══════════════════════════════════════════════════════════════════
async function resolveNowPlaying(ch) {
  const np = ch.nowPlaying;
  if (!np) return null;
  if (np.type === 'ftpengine') {
    const pl = np.playlist;
    if (!pl?.length) return null;
    return playlistNowPlaying(pl);
  }
  if (np.type === 'fetchjs') {
    const pl = await fetchRemotePlaylist(np.url, np.varName || 'videoPlaylist');
    if (!pl) return null;
    return playlistNowPlaying(pl);
  }
  if (np.type === 'static') return { text: np.text, videoId: null };
  return null;
}

// ══════════════════════════════════════════════════════════════════
//  THUMBNAILS
// ══════════════════════════════════════════════════════════════════
function ytThumb(id, q) { return `https://i.ytimg.com/vi/${id}/${q}.jpg`; }

function loadYtThumb(img, videoId, onDone) {
  img.onerror = () => {
    img.onerror = () => { onDone && onDone(false); };
    img.src = ytThumb(videoId, 'hqdefault');
  };
  img.onload = () => { onDone && onDone(true); };
  img.src    = ytThumb(videoId, 'maxresdefault');
}

// ══════════════════════════════════════════════════════════════════
//  BUILD GRID
// ══════════════════════════════════════════════════════════════════
const cardMap = {};

function buildGrid() {
  const grid = document.getElementById('channel-grid');
  grid.innerHTML = '';
  CHANNELS.forEach(ch => buildCard(ch, grid));
}

function buildCard(ch, grid) {
  const staticSrc = ch.thumb
    ? ch.thumb
    : ch.thumbId ? ytThumb(ch.thumbId, 'hqdefault') : null;

  const card = document.createElement('a');
  card.className     = 'ch-card' + (ch.featured ? ' featured' : '');
  card.href          = ch.href;
  card.dataset.chNum = ch.num;
  card.setAttribute('role', 'listitem');
  card.setAttribute('tabindex', '0');
  card.setAttribute('aria-label', `Channel ${ch.num}: ${ch.name}`);

  const voted = votedChannels.has(String(ch.num));

  card.innerHTML = `
    <div class="ch-thumb">
      ${staticSrc ? `<img class="ch-thumb-static" src="${staticSrc}" alt="${ch.name}" loading="lazy">` : ''}
      <img class="ch-thumb-live" alt="" aria-hidden="true">
      <div class="ch-thumb-fb"${staticSrc ? ' style="display:none"' : ''}>
        <div class="ch-thumb-fb-num">${String(ch.num).padStart(2,'0')}</div>
      </div>
      <div class="ch-live${ch.live ? '' : ' off'}">LIVE</div>
      <div class="ch-on-air">ON AIR</div>
      <div class="ch-num-overlay">CH ${String(ch.num).padStart(2,'0')}</div>
      <div class="ch-np">
        <div class="ch-np-label">Now Playing</div>
        <div class="ch-np-text loading" data-np>···</div>
      </div>
    </div>
    <div class="ch-meta">
      <div class="ch-num">${String(ch.num).padStart(2,'0')}</div>
      <div class="ch-info">
        <div class="ch-name">${ch.name}</div>
        <div class="ch-desc">${ch.desc}</div>
        ${ch.tag ? `<div class="ch-tag">${ch.tag}</div>` : ''}
      </div>
    </div>
  `;

  // Vote button — injected separately so it doesn't interfere with card link
  const voteBtn = document.createElement('button');
  voteBtn.className = 'ch-vote' + (voted ? ' voted' : '');
  voteBtn.title = voted ? 'Voted' : 'Vote for this channel';
  voteBtn.textContent = '▲';
  voteBtn.addEventListener('click', e => {
    e.preventDefault(); e.stopPropagation();
    if (castChannelVote(ch.num, ch.name, liveVideoId)) {
      voteBtn.classList.add('voted');
      voteBtn.title = 'Voted';
    }
  });
  card.querySelector('.ch-thumb').appendChild(voteBtn);

  // Static thumb error
  const staticImg = card.querySelector('.ch-thumb-static');
  const fb        = card.querySelector('.ch-thumb-fb');
  if (staticImg) {
    staticImg.addEventListener('error', () => {
      staticImg.style.display = 'none';
      fb.style.display = '';
    });
  }

  // Hover live thumb
  const liveImg = card.querySelector('.ch-thumb-live');
  let liveLoaded  = false;
  let liveVideoId = ch.thumbId;

  card.addEventListener('mouseenter', () => {
    if (liveLoaded || !liveVideoId) return;
    liveLoaded = true;
    loadYtThumb(liveImg, liveVideoId, ok => {
      if (ok) liveImg.classList.add('ready');
    });
  });

  // Portal click analytics
  card.addEventListener('click', () => {
    if (typeof FTP_ANALYTICS !== 'undefined') {
      FTP_ANALYTICS.portalClick(ch, liveVideoId);
    }
  });

  grid.appendChild(card);
  cardMap[ch.num] = card;

  // Resolve now-playing
  resolveNowPlaying(ch).then(result => {
    const npEl = card.querySelector('[data-np]');
    if (!npEl) return;

    if (!ch.nowPlaying) {
      npEl.textContent = '—'; npEl.classList.remove('loading'); return;
    }

    if (result?.text) {
      npEl.textContent = result.text;
      npEl.classList.remove('loading');
    } else {
      npEl.textContent = 'signal lost';
      npEl.classList.remove('loading');
      npEl.classList.add('error');
    }

    if (result?.videoId) {
      liveVideoId = result.videoId;
      if (ch.featured && staticImg) {
        const liveSrc = ytThumb(result.videoId, 'hqdefault');
        if (staticImg.src !== liveSrc) staticImg.src = liveSrc;
      }
    }
  });
}

// ══════════════════════════════════════════════════════════════════
//  HERO STRIP
// ══════════════════════════════════════════════════════════════════
async function updateHeroStrip() {
  const featured = CHANNELS.find(c => c.featured) || CHANNELS[0];
  document.getElementById('hs-ch').textContent = `CH ${String(featured.num).padStart(2,'0')} / Now Playing`;
  const result = await resolveNowPlaying(featured);
  if (!result?.text) return;
  const p = parseTitle(result.text);
  document.getElementById('hs-track').textContent = p.artist || result.text;
  document.getElementById('hs-ctx').textContent   = p.context || '';
}

// ══════════════════════════════════════════════════════════════════
//  REFRESH
// ══════════════════════════════════════════════════════════════════
function refreshNowPlaying() {
  CHANNELS.forEach(ch => {
    const card = cardMap[ch.num];
    if (!card) return;
    const npEl = card.querySelector('[data-np]');
    if (!npEl) return;
    npEl.textContent = '···';
    npEl.classList.add('loading');
    npEl.classList.remove('error');
    resolveNowPlaying(ch).then(result => {
      if (result?.text) {
        npEl.textContent = result.text;
        npEl.classList.remove('loading');
      } else {
        npEl.textContent = ch.nowPlaying ? 'signal lost' : '—';
        npEl.classList.remove('loading');
        if (ch.nowPlaying) npEl.classList.add('error');
      }
    });
  });
  updateHeroStrip();
}

// ══════════════════════════════════════════════════════════════════
//  CLOCK
// ══════════════════════════════════════════════════════════════════
function tick() {
  const n = new Date();
  document.getElementById('clock').textContent =
    [n.getHours(), n.getMinutes(), n.getSeconds()].map(x => String(x).padStart(2,'0')).join(':');
}
setInterval(tick, 1000); tick();
setInterval(refreshNowPlaying, 60_000);

// ── INIT ───────────────────────────────────────────────────────────
buildGrid();
updateHeroStrip();
</script>
</body>
</html>
