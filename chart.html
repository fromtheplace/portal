<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VIDEO WON — CATALOGUE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,900;1,700&display=swap" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/ds-digital" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/dseg7-classic" rel="stylesheet">
<style>

:root {
  --red:        #CC0000;
  --red-dim:    #880000;
  --red-glow:   rgba(204,0,0,0.15);
  --yellow:     #FFE600;
  --yellow-dim: #998a00;
  --cyan:       #00C8E8;
  --pink:       #FF3399;
  --white:      #FAFAF7;
  --black:      #111111;

  /* Dark theme defaults */
  --bg:         #0f0f0f;
  --surface:    #181818;
  --surface-2:  #212121;
  --border:     #2c2c2c;
  --border-hi:  #404040;
  --text:       #aaa49a;
  --text-dim:   #505050;
  --text-hi:    #FAFAF7;
  --text-lo:    #2e2e2e;

  --font-disp:  'Bebas Neue', 'Barlow Condensed', sans-serif;
  --font-mono:  'IBM Plex Mono', monospace;
  --font-cond:  'Barlow Condensed', sans-serif;
  --font-lcd:   'DS-Digital', 'DSEG7 Classic', monospace;

  --masthead-h: 78px;
  --hero-h:     0px;
  --player-h:   62px;
  --vid-w:      320px;
  --sidebar-w:  280px;
  --ts: 1.3;
}

/* ── LIGHT THEME — newsprint editorial ──────────────────────────── */
[data-theme="light"] {
  --bg:        #F5F4F0;
  --surface:   #FFFFFF;
  --surface-2: #EFEFEB;
  --border:    #DDDDDD;
  --border-hi: #BBBBBB;
  --text:      #333333;
  --text-dim:  #888888;
  --text-hi:   #000000;
  --text-lo:   #CCCCCC;
  --black:     #111111;
}

/* ── RESET ──────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; font-size: calc(13px * var(--ts)); }
body {
  height: 100%; background: var(--bg); color: var(--text);
  font-family: var(--font-mono); font-size: 1rem;
  line-height: 1.5; overflow: hidden;
  transition: background 0.25s, color 0.25s;
}

/* ── SCANLINES — dark only ──────────────────────────────────────── */
[data-theme="dark"] body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 997;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px);
}

/* ── SHELL ──────────────────────────────────────────────────────── */
#masthead {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: var(--masthead-h);
  background: var(--black);
  display: flex; align-items: stretch;
  border-bottom: 3px solid var(--red);
}
/* light mode: white masthead like MTV */
[data-theme="light"] #masthead {
  background: #ffffff;
  border-bottom: 4px solid var(--red);
}
[data-theme="light"] #clock { color: var(--red); text-shadow: none; }
[data-theme="light"] #clock::before { color: rgba(204,0,0,0.08); }
[data-theme="light"] .mast-search input { background: #f0f0f0; border-color: #ccc; color: #111; }
[data-theme="light"] .mast-search input::placeholder { color: #aaa; }
[data-theme="light"] .mast-search::before { color: #aaa; }
[data-theme="light"] .on-air-bug { background: var(--red); }
[data-theme="light"] .gui-btn { color: #444; border-color: #ccc; }
[data-theme="light"] .gui-btn:hover { color: #000; border-color: #888; }
[data-theme="light"] .mast-link { color: #444; }
[data-theme="light"] .mast-link:hover { color: #000; }
[data-theme="light"] #logo-cell { border-right-color: #eee; }
[data-theme="light"] .mast-right { border-left-color: #eee; }
/* hero strip light */
[data-theme="light"] #hero-strip { background: #CC0000; border-bottom-color: #aa0000; }
[data-theme="light"] .hs-label { color: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.4); }
[data-theme="light"] .hs-track { color: #ffffff; }
[data-theme="light"] .hs-now { color: rgba(255,255,255,0.8); }
/* sidebar light */
[data-theme="light"] #sidebar { background: #fff; border-right-color: #ddd; }
/* view tabs light */
[data-theme="light"] .view-tabs { background: #fff; border-bottom-color: #ddd; }
[data-theme="light"] .view-tab.active { color: var(--red); border-bottom-color: var(--red); }
/* genre sticker pops — light mode gets bold saturated colours */
[data-theme="light"] .tile-genre,
[data-theme="light"] .list-genre-tag,
[data-theme="light"] .timeline-tag { filter: saturate(1.3) brightness(0.95); }
/* player bar light */
[data-theme="light"] #player-bar { background: var(--black); }
[data-theme="light"] .player-title { color: var(--white); }
[data-theme="light"] .player-artist { color: #888; }
#hero-strip { display: none; }

/* ── DRAG RESIZE HANDLE ──────────────────────────────────────────── */
#vid-resize-handle {
  position: absolute; left: 0; top: 0; bottom: 0; width: 6px;
  cursor: ew-resize; z-index: 30;
  background: transparent;
  transition: background 0.15s;
}
#vid-resize-handle:hover,
#vid-resize-handle.dragging { background: var(--red); }

/* ── FULLSCREEN BUTTON ───────────────────────────────────────────── */
#vid-fullscreen-btn {
  position: absolute; top: 8px; right: 8px; z-index: 25;
  width: 26px; height: 26px;
  background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.7); font-size: 11px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.12s; border-radius: 2px;
}
#vid-fullscreen-btn:hover { background: var(--red); border-color: var(--red); color: #fff; }

/* fullscreen mode */
#vid-panel.fullscreen {
  position: fixed !important;
  inset: 0 !important;
  width: 100% !important;
  height: 100% !important;
  z-index: 500 !important;
  border: none !important;
}
#vid-panel.fullscreen #vid-info { display: none; }

/* ── TEXT SIZE CYCLE BUTTON ──────────────────────────────────────── */
#btn-text-size {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--surface); border: 1px solid var(--border);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-family: var(--font-cond); font-weight: 900; font-size: 11px;
  letter-spacing: 0.05em; text-transform: uppercase;
  color: var(--text-hi);
  transition: all 0.15s; flex-shrink: 0; line-height: 1;
}
#btn-text-size:hover { border-color: var(--red); color: var(--red); transform: scale(1.1); }
[data-theme="light"] #btn-text-size { color: #333; }
#player-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
  height: var(--player-h);
  background: var(--black);
  border-top: 3px solid var(--red);
  display: flex; align-items: center; gap: 10px; padding: 0 14px;
}
#app {
  position: fixed;
  top: calc(var(--masthead-h) + var(--hero-h));
  bottom: var(--player-h);
  left: 0; right: 0;
  display: flex; overflow: hidden;
}

/* ══════════════════════════════════════════════════════════════════
   MASTHEAD
══════════════════════════════════════════════════════════════════ */
/* VIDEO WON logo — SVG inline, inverted to white */
#logo-cell {
  display: flex; align-items: center; padding: 0 16px;
  border-right: 1px solid #333;
  flex-shrink: 0; cursor: default;
}
#logo-cell svg { height: 50px; width: auto; }

/* LCD clock — now inside mast-right — always small regardless of text scale */
#clock-cell {
  display: flex; align-items: center; padding: 0 8px;
  flex-shrink: 0;
}
#clock {
  font-family: var(--font-lcd);
  font-size: 0.95rem; /* small — fixed, not scaled with --ts */
  color: var(--red);
  letter-spacing: 0.06em;
  text-shadow: 0 0 8px rgba(204,0,0,0.6), 0 0 16px rgba(204,0,0,0.3);
  position: relative;
}
#clock::before {
  content: attr(data-ghost);
  position: absolute; inset: 0;
  color: rgba(204,0,0,0.15);
  pointer-events: none;
  letter-spacing: 0.04em;
}

/* ── SEARCH with clear button ────────────────────────────────────── */
.mast-search { flex: 1; max-width: 300px; position: relative; }
.mast-search input {
  width: 100%; background: #222; border: 1px solid #333; border-bottom: 2px solid var(--red);
  color: var(--white); padding: 6px 28px 6px 26px;
  font-family: var(--font-mono); font-size: 0.8rem; outline: none;
  transition: border-color 0.15s, background 0.15s;
}
.mast-search input:focus { background: #2a2a2a; border-color: var(--red); }
.mast-search input::placeholder { color: #555; }
.mast-search::before { content: '⌕'; position: absolute; left: 7px; top: 50%; transform: translateY(-50%); color: #555; font-size: 14px; pointer-events: none; z-index: 1; }
/* X clear button */
#search-clear {
  position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: #555; font-size: 13px; cursor: pointer;
  padding: 2px 4px; line-height: 1; display: none; /* hidden until there's input */
  z-index: 1;
}
#search-clear:hover { color: var(--red); }
#search-clear.visible { display: block; }

.mast-center {
  flex: 1; display: flex; align-items: center; gap: 10px; padding: 0 12px; min-width: 0;
}

/* On-air bug */
.on-air-bug {
  display: flex; align-items: center; gap: 5px; flex-shrink: 0;
  background: var(--red); padding: 3px 8px;
}
.on-air-dot { width: 5px; height: 5px; border-radius: 50%; background: #fff; animation: dot-blink 1.1s step-end infinite; }
@keyframes dot-blink { 0%,100%{opacity:1} 50%{opacity:0} }
.on-air-text { font-family: var(--font-cond); font-weight: 700; font-size: 0.55rem; letter-spacing: 0.3em; color: #fff; text-transform: uppercase; }

.mast-right {
  display: flex; align-items: center; gap: 8px; padding: 0 14px;
  border-left: 1px solid #333; flex-shrink: 0;
}
/* GUI buttons */
.gui-btn {
  font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.12em;
  text-transform: uppercase; color: #666; border: 1px solid #333;
  padding: 4px 8px; background: none; cursor: pointer; transition: all 0.12s; white-space: nowrap;
}
.gui-btn:hover { color: var(--white); border-color: #666; }
.gui-btn.active { color: var(--red); border-color: var(--red); background: var(--red-glow); }
.gui-sep { width: 1px; height: 18px; background: #333; flex-shrink: 0; }
.mast-link {
  font-family: var(--font-cond); font-weight: 700; font-size: 0.65rem;
  letter-spacing: 0.18em; color: #555; text-transform: uppercase;
  text-decoration: none; transition: color 0.12s; white-space: nowrap;
}
.mast-link:hover { color: var(--white); }

/* ══════════════════════════════════════════════════════════════════
   HERO STRIP
══════════════════════════════════════════════════════════════════ */
.hs-label {
  font-family: var(--font-cond); font-weight: 700; font-size: 0.6rem;
  letter-spacing: 0.35em; color: var(--red); text-transform: uppercase; flex-shrink: 0;
  border: 1px solid var(--red); padding: 1px 5px;
}
.hs-track {
  font-family: var(--font-disp); font-size: 1.25rem;
  color: var(--text-hi); letter-spacing: 0.06em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
}
.hs-stats {
  font-size: 0.65rem; color: var(--text-dim); letter-spacing: 0.12em; white-space: nowrap; flex-shrink: 0;
}
/* ticker-style marquee for now playing */
.hs-now {
  font-family: var(--font-mono); font-size: 0.65rem; color: var(--red);
  white-space: nowrap; flex-shrink: 0; letter-spacing: 0.08em;
}

/* ══════════════════════════════════════════════════════════════════
   FEATURED COLUMN (replaces genre sidebar)
══════════════════════════════════════════════════════════════════ */
#sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  border-right: 1px solid var(--border);
  background: var(--surface);
  overflow-y: auto; display: flex; flex-direction: column;
}
/* section subhead — red block label same as MTV editorial */
.feat-head {
  font-family: var(--font-cond); font-weight: 700; font-size: 0.5rem;
  letter-spacing: 0.32em; color: #fff; text-transform: uppercase;
  padding: 4px 8px 4px;
  background: var(--red);
  flex-shrink: 0;
}
/* featured tile — identical structure to main grid tiles */
.feat-tile {
  background: var(--surface); cursor: pointer; position: relative;
  transition: background 0.1s; flex-shrink: 0;
  border-bottom: 1px solid var(--border);
}
.feat-tile:hover { background: var(--surface-2); }
.feat-tile.playing { background: var(--surface-2); outline: 2px solid var(--red); outline-offset: -2px; }
.feat-tile .tile-thumb { position: relative; width: 100%; padding-top: 56.25%; background: #000; overflow: hidden; }
.feat-tile .tile-thumb-img {
  position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
  filter: saturate(0.6) brightness(0.75) contrast(1.08);
  transition: filter 0.22s, opacity 0.22s;
}
.feat-tile:hover .tile-thumb-img { filter: saturate(0.9) brightness(0.88); }
.feat-tile .tile-thumb::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(0deg, rgba(10,10,10,0.9) 0%, transparent 55%);
  pointer-events: none; z-index: 2;
}
.feat-tile .tile-genre {
  position: absolute; top: 5px; left: 5px; z-index: 3;
  font-family: var(--font-cond); font-weight: 900; font-size: 0.45rem;
  letter-spacing: 0.18em; text-transform: uppercase;
  padding: 2px 5px; color: #000;
  clip-path: polygon(3px 0%, 100% 0%, calc(100% - 3px) 100%, 0% 100%);
}
.feat-tile .tile-np {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 4;
  padding: 3px 7px 5px; pointer-events: none;
}
.feat-tile .tile-np-title {
  font-family: var(--font-disp); font-size: 0.9rem; color: rgba(244,242,238,0.95);
  letter-spacing: 0.04em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.1;
}
.feat-tile .tile-meta { padding: 5px 8px 7px; }
.feat-tile .tile-artist {
  font-family: var(--font-cond); font-weight: 700; font-size: 0.75rem;
  letter-spacing: 0.05em; color: var(--text-hi); text-transform: uppercase;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.feat-tile .tile-song {
  font-size: 0.65rem; color: var(--text-dim); margin-top: 1px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
/* skeleton loader */
.feat-skeleton {
  height: 120px; background: var(--surface-2);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono); font-size: 0.6rem;
  color: var(--text-lo); letter-spacing: 0.2em; text-transform: uppercase;
  animation: skel-pulse 1.4s ease-in-out infinite;
}
@keyframes skel-pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

/* ══════════════════════════════════════════════════════════════════
   CENTRE + CONTENT
══════════════════════════════════════════════════════════════════ */
#centre { flex: 1; display: flex; overflow: hidden; min-width: 0; }
#content { flex: 1; overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column; min-width: 0; }

/* ── VIEW TABS — large as section headers ────────────────────────── */
.view-tabs {
  display: flex; align-items: stretch;
  background: var(--surface); border-bottom: 3px solid var(--border);
  position: sticky; top: 0; z-index: 10; flex-shrink: 0;
}
.view-tab {
  font-family: var(--font-disp); font-size: 2rem;
  letter-spacing: 0.1em; color: var(--text-dim); text-transform: uppercase;
  padding: 8px 20px; border-bottom: 3px solid transparent; cursor: pointer;
  transition: all 0.12s; background: none; border-top: none; border-left: none; border-right: none;
  white-space: nowrap; line-height: 1;
}
.view-tab:hover { color: var(--text); }
.view-tab.active { color: var(--text-hi); border-bottom-color: var(--red); }

/* ── MOBILE GENRE CHIPS ──────────────────────────────────────────── */
@media (min-width: 601px) { #genre-chips { display: none; } }
#genre-chips {
  display: flex; overflow-x: auto; gap: 5px; padding: 7px 10px;
  border-bottom: 1px solid var(--border); background: var(--surface);
  flex-shrink: 0; -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
#genre-chips::-webkit-scrollbar { display: none; }
.genre-chip {
  font-family: var(--font-cond); font-weight: 700; font-size: 0.65rem;
  letter-spacing: 0.16em; text-transform: uppercase; padding: 4px 9px;
  border: 1px solid var(--border); background: none;
  color: var(--text-dim); cursor: pointer; white-space: nowrap; transition: all 0.1s; flex-shrink: 0;
}
.genre-chip.active { color: #000; border-color: transparent; }

/* ══════════════════════════════════════════════════════════════════
   TILE GRID
══════════════════════════════════════════════════════════════════ */
#tile-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(168px, 1fr));
  gap: 1px; background: var(--border);
}

.tile { background: var(--surface); cursor: pointer; position: relative; transition: background 0.1s; }
.tile:hover { background: var(--surface-2); }
.tile.playing { background: var(--surface-2); outline: 2px solid var(--red); outline-offset: -2px; z-index: 1; }

/* thumb */
.tile-thumb { position: relative; width: 100%; padding-top: 56.25%; background: #000; overflow: hidden; }
.tile-thumb-img {
  position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
  filter: saturate(0.6) brightness(0.75) contrast(1.08);
  transition: filter 0.22s, opacity 0.22s;
}
.tile:hover .tile-thumb-img, .tile.playing .tile-thumb-img { filter: saturate(0.9) brightness(0.88) contrast(1.05); }
.tile-thumb-live { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.28s; }
.tile:hover .tile-thumb-live.ready { opacity: 1; }
.tile:hover .tile-thumb-img { opacity: 0; }
.tile-thumb-fb {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  background: #1a1a1a; font-family: var(--font-disp); font-size: 2.4rem; color: #333;
}
/* bottom gradient */
.tile-thumb::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(0deg, rgba(10,10,10,0.9) 0%, transparent 55%);
  pointer-events: none; z-index: 2;
}

/* genre sticker — MTV editorial colour pops per genre */
.tile-genre {
  position: absolute; top: 6px; left: 6px; z-index: 3;
  font-family: var(--font-cond); font-weight: 900; font-size: 0.5rem;
  letter-spacing: 0.2em; text-transform: uppercase;
  padding: 2px 6px; color: #000;
  clip-path: polygon(4px 0%, 100% 0%, calc(100% - 4px) 100%, 0% 100%);
  transition: transform 0.15s;
}
.tile:hover .tile-genre { transform: rotate(-1.5deg) scale(1.08); }
/* genre colour overrides — MTV-pop saturated */
.tile[data-genre="RAP"]  .tile-genre { background: #CC0000; color: #fff; }
.tile[data-genre="UNC"]  .tile-genre { background: #666666; color: #fff; }
.tile[data-genre="ROCK"] .tile-genre { background: #6600CC; color: #fff; }
.tile[data-genre="DJ"]   .tile-genre { background: #FF6600; color: #fff; }
.tile[data-genre="AMB"]  .tile-genre { background: #0099CC; color: #fff; }
.tile[data-genre="RNB"]  .tile-genre { background: #CC0099; color: #fff; }
.tile[data-genre="EVENT"].tile-genre { background: #000000; color: #FFE600; }

/* playing badge */
.tile-playing-badge {
  position: absolute; top: 6px; right: 6px; z-index: 3;
  font-family: var(--font-cond); font-weight: 700; font-size: 0.5rem; letter-spacing: 0.2em;
  color: #fff; background: var(--red); padding: 2px 6px; text-transform: uppercase; display: none;
  animation: badge-pulse 1.4s ease-in-out infinite;
}
@keyframes badge-pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
.tile.playing .tile-playing-badge { display: block; }

/* NP overlay */
.tile-np { position: absolute; bottom: 0; left: 0; right: 0; z-index: 4; padding: 4px 8px 6px; pointer-events: none; }
.tile-np-plays { display: none; } /* hidden on regular tiles */
.tile-np-title { display: none; } /* hidden on regular tiles — too cluttered */
/* show np overlays on featured sidebar tiles */
.feat-tile .tile-np-plays { display: block; font-family: var(--font-cond); font-size: 0.5rem; letter-spacing: 0.2em; color: var(--red); text-transform: uppercase; margin-bottom: 1px; }
.feat-tile .tile-np-title { display: block; font-family: var(--font-disp); font-size: 0.95rem; color: rgba(244,242,238,0.95); letter-spacing: 0.04em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.1; }

/* tile meta */
.tile-meta { padding: 7px 9px 9px; }
.tile-artist { font-family: var(--font-cond); font-weight: 700; font-size: 0.78rem; letter-spacing: 0.06em; color: var(--text-hi); text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tile-song { font-size: 0.68rem; color: var(--text-dim); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tile-dur { font-size: 0.6rem; color: var(--text-lo); float: right; margin-top: -10px; }

/* ══════════════════════════════════════════════════════════════════
   LIST VIEW
══════════════════════════════════════════════════════════════════ */
.list-header {
  display: grid; grid-template-columns: 30px 1fr 64px 52px 64px;
  padding: 6px 14px; font-family: var(--font-cond); font-weight: 700; font-size: 0.55rem;
  letter-spacing: 0.3em; color: var(--text-dim); text-transform: uppercase;
  border-bottom: 1px solid var(--border); position: sticky; top: 37px; background: var(--bg); z-index: 9;
}
.list-row {
  display: grid; grid-template-columns: 30px 1fr 64px 52px 64px;
  padding: 0 14px; align-items: center; min-height: 44px;
  border-bottom: 1px solid rgba(46,46,46,0.6);
  cursor: pointer; transition: background 0.08s;
}
.list-row:hover { background: var(--surface); }
.list-row.playing { background: var(--surface); border-left: 3px solid var(--red); }
.list-row-num {
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-disp); font-size: 1.1rem; color: var(--text-lo); line-height: 1;
}
.list-row.playing .list-row-num { color: var(--red); }
.list-row-num-inner { display: block; }
.list-row.playing .list-row-num-inner { display: none; }
.playing-eq { display: none; gap: 2px; align-items: flex-end; height: 12px; }
.list-row.playing .playing-eq { display: flex; }
.playing-eq span { width: 2px; background: var(--red); border-radius: 1px; animation: eq 0.65s ease infinite alternate; }
.playing-eq span:nth-child(2) { animation-delay: 0.15s; }
.playing-eq span:nth-child(3) { animation-delay: 0.3s; }
@keyframes eq { from{height:3px} to{height:12px} }
.list-row-info { padding: 5px 8px 5px 0; min-width: 0; }
.list-row-title { font-family: var(--font-cond); font-weight: 700; font-size: 0.82rem; letter-spacing: 0.05em; color: var(--text-hi); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-transform: uppercase; }
.list-row-artist { font-size: 0.68rem; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
.list-genre-tag {
  font-family: var(--font-cond); font-weight: 900; font-size: 0.5rem; letter-spacing: 0.16em;
  padding: 2px 6px; color: #000; text-transform: uppercase; display: inline-block;
  clip-path: polygon(4px 0%, 100% 0%, calc(100% - 4px) 100%, 0% 100%);
}
.list-row-dur { font-family: var(--font-mono); font-size: 0.68rem; color: var(--text-dim); text-align: center; }
.list-yt-link {
  font-family: var(--font-cond); font-weight: 700; font-size: 0.6rem; letter-spacing: 0.12em;
  color: var(--text-dim); text-decoration: none; border: 1px solid var(--border);
  padding: 3px 7px; transition: all 0.12s; text-transform: uppercase; text-align: center; display: block;
}
.list-yt-link:hover { color: var(--red); border-color: var(--red); }

/* ══════════════════════════════════════════════════════════════════
   CHART VIEW
══════════════════════════════════════════════════════════════════ */
.chart-wrap { padding: 0 14px 14px; }
.chart-header {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 0 10px; border-bottom: 1px solid var(--border); margin-bottom: 12px;
}
.chart-source-badge {
  font-family: var(--font-cond); font-weight: 700; font-size: 0.55rem; letter-spacing: 0.2em;
  text-transform: uppercase; padding: 2px 7px; color: #fff; background: var(--red);
}
/* period buttons live in the view-tabs strip — large display font */
#chart-subnav { display: none; align-items: stretch; margin-left: auto; }
.chart-period-btn {
  font-family: var(--font-disp); font-size: 1.6rem; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--text-dim);
  padding: 8px 14px; border: none; border-bottom: 3px solid transparent;
  background: none; cursor: pointer; transition: all 0.12s; line-height: 1; white-space: nowrap;
}
.chart-period-btn:hover { color: var(--text); }
.chart-period-btn.active { color: var(--text-hi); border-bottom-color: var(--red); }
.chart-list { display: flex; flex-direction: column; border: 1px solid var(--border); margin-bottom: 14px; }
.chart-row {
  display: grid; grid-template-columns: 28px 44px 1fr 32px;
  align-items: center; padding: 0 10px; min-height: 46px;
  border-bottom: 1px solid rgba(46,46,46,0.5); cursor: pointer; transition: background 0.08s;
}
.chart-row:last-child { border-bottom: none; }
.chart-row:hover { background: var(--surface-2); }
.chart-row.playing { background: var(--surface-2); border-left: 3px solid var(--red); }
.chart-rank { font-family: var(--font-disp); font-size: 1.4rem; color: var(--text-lo); text-align: center; line-height: 1; }
.chart-rank.gold { color: var(--yellow); text-shadow: 0 0 8px rgba(232,255,0,0.4); }
.chart-rank.silver { color: #aaa; }
.chart-rank.bronze { color: #8B6914; }
.chart-thumb-sm {
  width: 36px; height: 24px; object-fit: cover; display: block; margin: 0 5px;
  filter: saturate(0.5) brightness(0.7);
  transition: filter 0.15s;
}
.chart-row:hover .chart-thumb-sm, .chart-row.playing .chart-thumb-sm { filter: saturate(1) brightness(0.9); }
.chart-info { min-width: 0; padding: 0 6px; }
.chart-info-title { font-family: var(--font-cond); font-weight: 700; font-size: 0.78rem; letter-spacing: 0.05em; color: var(--text-hi); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-transform: uppercase; }
.chart-info-sub { font-size: 0.65rem; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chart-score { display: none; } /* points hidden from users */
.chart-move { font-size: 1rem; text-align: center; font-family: var(--font-cond); font-weight: 700; line-height: 1; }
.chart-move.up   { color: #44DD44; }   /* green up arrow */
.chart-move.down { color: #4488FF; }   /* blue down arrow — overtaken */
.chart-move.new  { color: var(--yellow); font-size: 0.75rem; } /* yellow star — new entry */
.chart-move.same { color: var(--text-lo); }

/* genre breakdown */
.chart-breakdown { border: 1px solid var(--border); padding: 12px; display: flex; flex-direction: column; gap: 0; }
.breakdown-title { font-family: var(--font-disp); font-size: 1.1rem; color: var(--text-hi); margin-bottom: 10px; letter-spacing: 0.08em; }
.breakdown-row { margin-bottom: 7px; }
.breakdown-genre-label { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2px; }
.breakdown-name { font-family: var(--font-cond); font-weight: 700; font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase; }
.breakdown-count { font-family: var(--font-disp); font-size: 1rem; }
.breakdown-bar-track { height: 2px; background: var(--border); }
.breakdown-bar-fill { height: 2px; transition: width 1s ease; }

/* timeline */
.chart-timeline { border: 1px solid var(--border); }
.timeline-head {
  padding: 7px 12px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  font-family: var(--font-cond); font-weight: 700; font-size: 0.6rem;
  letter-spacing: 0.28em; color: var(--text-dim); text-transform: uppercase;
}
.timeline-entry {
  display: flex; align-items: center; gap: 9px; padding: 6px 12px;
  border-bottom: 1px solid rgba(46,46,46,0.4); cursor: pointer; transition: background 0.08s;
}
.timeline-entry:last-child { border-bottom: none; }
.timeline-entry:hover { background: var(--surface); }
.timeline-time { font-family: var(--font-lcd); font-size: 0.9rem; color: var(--red); width: 44px; flex-shrink: 0; text-shadow: 0 0 6px rgba(204,0,0,0.5); }
.timeline-thumb { width: 34px; height: 22px; object-fit: cover; flex-shrink: 0; filter: saturate(0.4) brightness(0.7); }
.timeline-info { flex: 1; min-width: 0; }
.timeline-title { font-family: var(--font-cond); font-weight: 700; font-size: 0.72rem; color: var(--text-hi); text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.timeline-artist { font-size: 0.62rem; color: var(--text-dim); }
.timeline-tag {
  font-family: var(--font-cond); font-weight: 900; font-size: 0.5rem; letter-spacing: 0.14em;
  padding: 2px 5px; color: #000; text-transform: uppercase; flex-shrink: 0;
  clip-path: polygon(3px 0%, 100% 0%, calc(100% - 3px) 100%, 0% 100%);
}
.chart-loading { padding: 30px; text-align: center; font-family: var(--font-cond); font-size: 0.72rem; letter-spacing: 0.24em; color: var(--text-dim); text-transform: uppercase; }

/* ══════════════════════════════════════════════════════════════════
   VIDEO PANEL — right side desktop / above player mobile
   Crop approach: iframe is scaled LARGER than container so all YT
   chrome (top bar, bottom bar, end screen tiles) bleeds off-edge
   and is clipped by overflow:hidden. Zero black bars, zero masks.
══════════════════════════════════════════════════════════════════ */
#vid-panel {
  width: var(--vid-w); flex-shrink: 0;
  border-left: 1px solid var(--border);
  background: #000; display: none; flex-direction: column;
  position: relative; overflow: hidden;
}
#vid-panel.on { display: flex; }

/* red stripe + scanlines — purely decorative, no masking role */
#vid-panel::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--red); z-index: 20; pointer-events: none;
}
#vid-panel::after {
  content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 18;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.05) 3px, rgba(0,0,0,0.05) 4px);
}

#yt-wrap {
  flex: 1; position: relative; overflow: hidden;
  background: #000; min-height: 0;
}
/* pixel-based negative insets — proven working approach from v4 */
#yt-inner {
  position: absolute;
  top: -48px; bottom: -48px; left: -2px; right: -2px;
}
#yt-inner iframe,
#yt-inner > div {
  width: 100% !important; height: 100% !important;
  border: none !important; position: absolute !important;
  top: 0 !important; left: 0 !important;
}
/* black masks over YT chrome top and bottom */
#yt-mask-top {
  position: absolute; top: 0; left: 0; right: 0; height: 50px;
  background: #000; z-index: 12; pointer-events: none;
}
#yt-mask-bot {
  position: absolute; bottom: 0; left: 0; right: 0; height: 50px;
  background: #000; z-index: 12; pointer-events: none;
}

#vid-info {
  flex-shrink: 0; padding: 8px 10px 9px;
  border-top: 1px solid var(--border); background: var(--surface);
  position: relative; z-index: 19;
}
#vid-info-title {
  font-family: var(--font-cond); font-weight: 700; font-size: 0.78rem;
  color: var(--text-hi); text-transform: uppercase; letter-spacing: 0.06em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#vid-info-sub { font-size: 0.65rem; color: var(--text-dim); margin-top: 1px; }

/* ══════════════════════════════════════════════════════════════════
   PLAYER BAR
══════════════════════════════════════════════════════════════════ */
.player-thumb-wrap {
  width: 62px; height: 40px; flex-shrink: 0; position: relative;
  overflow: hidden; border: 1px solid #333; background: #1a1a1a;
  display: flex; align-items: center; justify-content: center;
}
.player-thumb-img { width: 100%; height: 100%; object-fit: cover; display: block; filter: saturate(0.7) brightness(0.85); }
/* scanline stripe on thumb */
.player-thumb-wrap::after {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.2) 2px, rgba(0,0,0,0.2) 3px);
}
.player-fb { font-family: var(--font-disp); font-size: 1.4rem; color: #333; }

.player-info { flex: 1; min-width: 0; }
.player-title {
  font-family: var(--font-cond); font-weight: 700; font-size: 0.82rem;
  letter-spacing: 0.06em; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-transform: uppercase;
}
.player-artist { font-size: 0.65rem; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
.player-genre-pip { display: inline-block; width: 6px; height: 6px; margin-right: 4px; vertical-align: middle; clip-path: polygon(4px 0%, 100% 0%, calc(100% - 4px) 100%, 0% 100%); }
.player-idle { color: #444; letter-spacing: 0.16em; font-size: 0.68rem; text-transform: uppercase; }

.progress-wrap { display: flex; align-items: center; gap: 7px; flex-shrink: 0; width: 210px; }
.prog-time { font-family: var(--font-lcd); font-size: 0.9rem; color: var(--red); flex-shrink: 0; width: 36px; text-align: center; text-shadow: 0 0 6px rgba(204,0,0,0.5); }
.prog-track { flex: 1; height: 3px; background: #333; cursor: pointer; position: relative; }
.prog-fill { height: 100%; background: var(--red); width: 0%; transition: width 0.35s linear; }
/* progress hover */
.prog-track:hover { height: 5px; margin-top: -1px; }

/* Volume */
.vol-wrap { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
.vol-icon { font-size: 11px; color: #555; cursor: pointer; user-select: none; transition: color 0.12s; }
.vol-icon:hover { color: var(--white); }
input[type=range].vol-slider {
  -webkit-appearance: none; appearance: none;
  width: 58px; height: 3px; background: #333; outline: none; cursor: pointer;
}
input[type=range].vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; border-radius: 50%; background: var(--red); cursor: pointer; }
input[type=range].vol-slider::-moz-range-thumb { width: 10px; height: 10px; border-radius: 50%; background: var(--red); border: none; cursor: pointer; }

.controls { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
.ctrl { background: none; border: none; color: #555; cursor: pointer; font-size: 13px; padding: 4px 5px; transition: color 0.1s; display: flex; align-items: center; }
.ctrl:hover { color: var(--white); }
.ctrl.play {
  width: 34px; height: 34px; background: var(--red); color: #fff;
  font-size: 12px; border: none; transition: background 0.12s;
}
.ctrl.play:hover { background: #ff1a1a; }

.toggle-video {
  font-family: var(--font-cond); font-weight: 700; font-size: 0.6rem; letter-spacing: 0.2em;
  text-transform: uppercase; color: #555; border: 1px solid #333;
  padding: 4px 9px; background: none; cursor: pointer; transition: all 0.12s; flex-shrink: 0;
}
.toggle-video:hover { color: var(--white); border-color: #666; }
.toggle-video.on { color: #fff; border-color: var(--red); background: var(--red); }

/* no results */
.no-results { padding: 40px 16px; text-align: center; font-family: var(--font-cond); font-weight: 700; font-size: 0.72rem; color: var(--text-dim); letter-spacing: 0.22em; text-transform: uppercase; display: none; }

/* ── FIXED THEME TOGGLE — circle button in masthead right ──────── */
#theme-corner {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--surface); border: 1px solid var(--border);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 15px; transition: all 0.15s; flex-shrink: 0; line-height: 1;
  /* bright in dark mode */
  color: #FFE600;
  text-shadow: 0 0 8px rgba(255,230,0,0.7), 0 0 16px rgba(255,230,0,0.4);
}
[data-theme="light"] #theme-corner { color: #888; text-shadow: none; }
#theme-corner:hover { border-color: var(--red); transform: scale(1.1); }

/* ── VOTE BUTTON ─────────────────────────────────────────────────── */
.tile-vote {
  position: absolute; bottom: 38px; right: 6px; z-index: 5;
  background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.25);
  color: rgba(255,255,255,0.6); font-size: 11px;
  width: 24px; height: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.12s; border-radius: 2px;
}
.tile-vote:hover { border-color: var(--red); color: var(--red); transform: scale(1.1); }
.tile-vote.voted { border-color: var(--red); color: var(--red); background: var(--red-glow); }
/* light mode vote — dark background so arrow is visible over light thumbs */
[data-theme="light"] .tile-vote {
  background: rgba(0,0,0,0.65); border-color: rgba(255,255,255,0.3); color: #fff;
}
[data-theme="light"] .tile-vote:hover { border-color: var(--red); color: var(--red); }
[data-theme="light"] .tile-vote.voted { background: rgba(204,0,0,0.85); border-color: var(--red); color: #fff; }
.player-vote {
  background: none; border: 1px solid #444; color: #666;
  font-size: 13px; padding: 5px 8px; cursor: pointer; transition: all 0.12s;
  flex-shrink: 0; display: flex; align-items: center; gap: 4px;
}
.player-vote:hover { border-color: var(--red); color: var(--red); }
.player-vote.voted { border-color: var(--red); color: var(--red); background: var(--red-glow); }
/* light mode player vote */
[data-theme="light"] .player-vote { border-color: #ccc; color: #888; }
[data-theme="light"] .player-vote:hover { border-color: var(--red); color: var(--red); }
.player-vote-count { font-family: var(--font-mono); font-size: 0.65rem; color: var(--red); }

/* scrollbar */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #333; }

/* ══════════════════════════════════════════════════════════════════
   MOBILE
══════════════════════════════════════════════════════════════════ */
@media (max-width: 600px) {
  :root { --player-h: 56px; }
  /* on mobile the app stacks vertically — sidebar on top, content below */
  #app { flex-direction: column; overflow-y: auto; overflow-x: hidden; }
  #sidebar {
    width: 100% !important; flex-shrink: 0;
    border-right: none; border-bottom: 1px solid var(--border);
    overflow-y: visible; flex-direction: row;
    display: flex; flex-wrap: nowrap; overflow-x: auto;
    scrollbar-width: none;
  }
  #sidebar::-webkit-scrollbar { display: none; }
  .feat-head { writing-mode: vertical-rl; text-orientation: mixed; padding: 8px 4px; flex-shrink: 0; min-width: 24px; }
  .feat-tile { min-width: 52vw; flex-shrink: 0; border-bottom: none; border-right: 1px solid var(--border); }
  #centre { flex: 1; min-height: 0; overflow: hidden; }
  .mast-link { display: none; }
  .gui-sep { display: none; }

  /* search — full width, not squashed */
  .mast-center { padding: 0 8px; }
  .mast-search { max-width: none; flex: 1; }

  /* view-tabs — horizontal scroll so chart sub-nav doesn't get lost */
  .view-tabs {
    overflow-x: auto; overflow-y: visible;
    flex-wrap: nowrap; -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .view-tabs::-webkit-scrollbar { display: none; }
  .view-tab { padding: 8px 14px; font-size: 1.5rem; flex-shrink: 0; }
  #chart-subnav { flex-shrink: 0; }
  .chart-period-btn { font-size: 1.3rem; padding: 8px 12px; }

  #tile-grid { grid-template-columns: repeat(2, 1fr); }
  .list-header, .list-row { grid-template-columns: 26px 1fr 52px; }
  .list-header > *:nth-child(4), .list-header > *:nth-child(5),
  .list-row > *:nth-child(4), .list-row > *:nth-child(5) { display: none; }
  .chart-top { grid-template-columns: 1fr; }
  .chart-breakdown { display: none; }
  .progress-wrap { width: 100px; }
  .prog-time { display: none; }
  .vol-wrap { display: none; }
  /* video above player on mobile */
  #vid-panel {
    position: fixed; bottom: var(--player-h); left: 0; right: 0;
    width: 100%; height: 56vw; z-index: 90;
    border-left: none; border-top: 3px solid var(--red);
    display: none;
  }
  #vid-panel.on { display: flex; }
  #app.vid-mobile { bottom: calc(var(--player-h) + 56vw); }
  #vid-info { display: none; }
  #vid-panel #yt-inner { top: -42px; bottom: -42px; left: -2px; right: -2px; }
  #vid-resize-handle { display: none; }
  .feat-skeleton { min-width: 52vw; }
}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════
     MASTHEAD
════════════════════════════════════════════════════════════════ -->
<header id="masthead">
  <!-- VIDEO WON logo: Arial Black blocks top, Arial thin italic bottom, theme-inverts -->
  <div id="logo-cell">
    <svg id="vw-logo" viewBox="0 0 175 75" xmlns="http://www.w3.org/2000/svg" aria-label="VIDEO WON" style="height:50px;width:auto;display:block">
      <defs>
        <style>
          /* dark mode: white boxes, black letters */
          .vw-box    { fill: #ffffff; }
          .vw-letter { fill: #111111; }
          /* light mode: black boxes, white letters */
          [data-theme="light"] .vw-box    { fill: #111111; }
          [data-theme="light"] .vw-letter { fill: #ffffff; }
        </style>
      </defs>

      <!-- V -->
      <rect class="vw-box" x="0"   y="0" width="36" height="37" rx="1"/>
      <text class="vw-letter" x="15"  y="30" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-style="italic" font-size="28" text-anchor="middle">V</text>
      <!-- I -->
      <rect class="vw-box" x="38"  y="0" width="22" height="37" rx="1"/>
      <text class="vw-letter" x="46"  y="30" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-style="italic" font-size="28" text-anchor="middle">I</text>
      <!-- D -->
      <rect class="vw-box" x="62"  y="0" width="38" height="37" rx="1"/>
      <text class="vw-letter" x="79"  y="30" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-style="italic" font-size="28" text-anchor="middle">D</text>
      <!-- E -->
      <rect class="vw-box" x="102" y="0" width="33" height="37" rx="1"/>
      <text class="vw-letter" x="115" y="30" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-style="italic" font-size="28" text-anchor="middle">E</text>
      <!-- O — right edge = 137+38 = 175 -->
      <rect class="vw-box" x="137" y="0" width="38" height="37" rx="1"/>
      <text class="vw-letter" x="153" y="30" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-style="italic" font-size="28" text-anchor="middle">O</text>

      <!-- ШОN right-aligned to x=175 — Arial weight 100 italic, red -->
      <text x="175" y="74"

<script>
// ══════════════════════════════════════════════════════════════════
//  TINYBIRD CONFIG
// ══════════════════════════════════════════════════════════════════
const TB_HOST     = 'https://api.europe-west2.gcp.tinybird.co';
const TB_READ_TOK = 'p.eyJ1IjogIjkxM2Y0MzdlLTc5OTItNGJjYS05MTY1LWQzYzBiMmE0ZGRkNiIsICJpZCI6ICIwZTk0NzZmMy0xMDI5LTRiZGMtYjZhNy1jNDQ4MDBmY2E3YTIiLCAiaG9zdCI6ICJnY3AtZXVyb3BlLXdlc3QyIn0.-CzFOa6KiJG9GeE8aA83Wcz7Ty7nlh2PjvWWcbew2Nc';

// ══════════════════════════════════════════════════════════════════
//  TRACK DATA
// ══════════════════════════════════════════════════════════════════


const GENRE_META = {
  ALL:  {label:'All',  color:'#888888'},
  ALT:  {label:'Alt',  color:'#E8FF00'},
  RAP:  {label:'Rap',  color:'#CC0000'},
  ROCK: {label:'Rock', color:'#9B4DE8'},
  JAZZ: {label:'Jazz', color:'#E8A000'},
  DJ:   {label:'DJ',   color:'#00B8E8'},
  FOLK: {label:'Folk', color:'#00CC66'},
  RNB:  {label:'R&B',  color:'#E800B8'},
  AMB:  {label:'Amb',  color:'#00CCB8'},
  EVENT:{label:'Event',color:'#E85000'},
  UNC:  {label:'Unc',  color:'#666666'},
};
const gc = g => GENRE_META[g]?.color || '#888';

// ══════════════════════════════════════════════════════════════════
//  SESSION TRACKING
// ══════════════════════════════════════════════════════════════════
let playCounts={}, playHistory=[];
function loadSession(){try{playCounts=JSON.parse(sessionStorage.getItem('ftp_counts')||'{}');playHistory=JSON.parse(sessionStorage.getItem('ftp_history')||'[]');}catch(e){}}
function saveSession(){try{sessionStorage.setItem('ftp_counts',JSON.stringify(playCounts));sessionStorage.setItem('ftp_history',JSON.stringify(playHistory));}catch(e){}}
function recordPlay(idx){
  const t=TRACKS[idx];
  playCounts[idx]=(playCounts[idx]||0)+1;
  playHistory.unshift({idx,playedAt:Date.now(),title:t.title,artist:t.artist,genre:t.genre,id:t.id});
  if(playHistory.length>100)playHistory.length=100;
  saveSession();
  if(typeof FTP_ANALYTICS!=='undefined') FTP_ANALYTICS.play(t,'catalogue');
  if(activeView==='chart') renderChart();
  // push this exact track INDEX to front of recent order — NOT video_id,
  // so other chapters sharing the same video_id don't float up with it
  tbRecentOrder = [idx, ...tbRecentOrder.filter(i => i !== idx)];
  const hsNow = document.getElementById('hs-now');
  if (hsNow) hsNow.textContent = `▶ ${t.artist}`;
}
loadSession();

// ══════════════════════════════════════════════════════════════════
//  VOTES — stored in localStorage, sent to Tinybird as event_type:'vote'
// ══════════════════════════════════════════════════════════════════
let votedIds = new Set(JSON.parse(localStorage.getItem('vw_votes') || '[]'));

function hasVoted(videoId) { return votedIds.has(videoId); }

function castVote(videoId, title, artist, genre) {
  if (hasVoted(videoId)) return false; // one vote per track per browser
  votedIds.add(videoId);
  localStorage.setItem('vw_votes', JSON.stringify([...votedIds]));
  // Send vote event to Tinybird
  if (typeof FTP_ANALYTICS !== 'undefined') {
    FTP_ANALYTICS.play({ id: videoId, title, artist, genre }, 'vote');
  } else {
    // Direct send if analytics not loaded
    const body = JSON.stringify({
      event_id: Math.random().toString(36).slice(2)+Date.now(),
      ts: new Date().toISOString().replace('T',' ').slice(0,19),
      session_id: sessionStorage.getItem('ftp_sid')||'anon',
      event_type: 'vote',
      video_id: videoId, title, artist, genre, source: 'catalogue'
    });
    fetch(`https://api.europe-west2.gcp.tinybird.co/v0/events?name=ftp_plays&token=${TB_READ_TOK}`,
      { method:'POST', body, headers:{'Content-Type':'application/json'}, keepalive:true }
    ).catch(()=>{});
  }
  return true;
}
async function tbFetch(pipe){
  const res=await fetch(`${TB_HOST}/v0/pipes/${pipe}.json?token=${TB_READ_TOK}`);
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  return (await res.json()).data||[];
}
// Universal recent plays order — stored as TRACK INDICES (not video IDs)
let tbChartCache = null, tbCacheTime = 0;
// This prevents all chapters sharing a video_id from all floating to the top
// when only one chapter has been played.
let tbRecentOrder = []; // array of TRACK INDICES in play order, most recent first

async function fetchRecentOrder() {
  try {
    const rows = await tbFetch('recent_plays');
    if (rows?.length) {
      const seen = new Set();
      const indices = [];
      for (const r of rows) {
        // Find the specific track index — match on video_id only if we have
        // no better info. We pick the FIRST match per video_id from the pipe
        // (since the pipe doesn't store start time, we can't be more specific).
        // Local plays always use exact index via recordPlay so this only
        // affects the initial Tinybird-sourced order for tracks never played locally.
        if (!seen.has(r.video_id)) {
          seen.add(r.video_id);
          const idx = TRACKS.findIndex(t => t.id === r.video_id);
          if (idx >= 0) indices.push(idx);
        }
      }
      tbRecentOrder = indices;
      render();
    }
  } catch(e) { console.warn('[recent order]', e.message); }
}

// ══════════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════════
let activeGenre='ALL', searchTerm='', sortBy='default', activeView='tiles', chartPeriod='plays';
let filteredIdxs=[], currentIdx=-1, isPlaying=false;
let ytPlayer=null, ytReady=false, ytApiLoading=false, progInterval=null;
let videoOn=false, currentVolume=80;

// ── TEXT SIZE CYCLE — single button, 5 sizes ────────────────────
const SCALES = [0.85, 1, 1.15, 1.3, 1.5, 1.75];
const SCALE_LABELS = ['XS','S','M','L','XL','XXL'];
let scaleIdx = 3; // default L
function applyScale(i) {
  scaleIdx = ((i % SCALES.length) + SCALES.length) % SCALES.length;
  document.documentElement.style.setProperty('--ts', SCALES[scaleIdx]);
  document.documentElement.style.fontSize = (13 * SCALES[scaleIdx]) + 'px';
  document.getElementById('btn-text-size').textContent = SCALE_LABELS[scaleIdx];
}
document.getElementById('btn-text-size').addEventListener('click', () => applyScale(scaleIdx + 1));
applyScale(3);

// ── THEME — corner button only ───────────────────────────────────
let isDark = false; // default light mode
function setTheme(dark) {
  isDark = dark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('theme-corner').textContent = isDark ? '☀' : '☾';
}
document.getElementById('theme-corner').addEventListener('click', () => setTheme(!isDark));
// init theme-corner icon to match default light
document.getElementById('theme-corner').textContent = '☾';

// ── DRAG RESIZE VIDEO PANEL ──────────────────────────────────────
(function() {
  const handle  = document.getElementById('vid-resize-handle');
  const panel   = document.getElementById('vid-panel');
  const minW = 200, maxW = 700;
  let dragging = false, startX = 0, startW = 0;

  handle.addEventListener('mousedown', e => {
    dragging = true;
    startX = e.clientX;
    startW = panel.offsetWidth;
    handle.classList.add('dragging');
    document.body.style.cursor = 'ew-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const delta = startX - e.clientX; // dragging left = bigger panel
    const newW  = Math.min(maxW, Math.max(minW, startW + delta));
    panel.style.width = newW + 'px';
    document.documentElement.style.setProperty('--vid-w', newW + 'px');
  });
  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });

  // Touch support
  handle.addEventListener('touchstart', e => {
    dragging = true;
    startX = e.touches[0].clientX;
    startW = panel.offsetWidth;
    e.preventDefault();
  }, { passive: false });
  document.addEventListener('touchmove', e => {
    if (!dragging) return;
    const delta = startX - e.touches[0].clientX;
    const newW  = Math.min(maxW, Math.max(minW, startW + delta));
    panel.style.width = newW + 'px';
    document.documentElement.style.setProperty('--vid-w', newW + 'px');
  });
  document.addEventListener('touchend', () => { dragging = false; });
})();

// ── FULLSCREEN TOGGLE ────────────────────────────────────────────
document.getElementById('vid-fullscreen-btn').addEventListener('click', () => {
  const panel = document.getElementById('vid-panel');
  const btn   = document.getElementById('vid-fullscreen-btn');
  const isFs  = panel.classList.toggle('fullscreen');
  btn.textContent = isFs ? '✕' : '⛶';
  btn.title = isFs ? 'Exit fullscreen' : 'Fullscreen';
});
// ESC exits fullscreen
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    const panel = document.getElementById('vid-panel');
    if (panel.classList.contains('fullscreen')) {
      panel.classList.remove('fullscreen');
      document.getElementById('vid-fullscreen-btn').textContent = '⛶';
    }

});

// ── VOLUME ───────────────────────────────────────────────────────
const volSlider=document.getElementById('vol-slider');
const volIcon=document.getElementById('vol-icon');
function applyVolume(v){
  currentVolume=v;
  volSlider.value=v;
  volIcon.textContent=v===0?'🔇':v<50?'🔉':'🔊';
  if(ytPlayer?.setVolume) ytPlayer.setVolume(v);
}
volSlider.addEventListener('input',()=>applyVolume(parseInt(volSlider.value)));
volIcon.addEventListener('click',()=>applyVolume(currentVolume>0?0:80));


// ══════════════════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════════════════
function fmtDur(s){if(!s||s<=0)return'--:--';const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;return h?`${h}:${pad(m)}:${pad(ss)}`:`${m}:${pad(ss)}`;}
function pad(n){return String(n).padStart(2,'0');}
function fmtTime(ts){const d=new Date(ts);return`${pad(d.getHours())}:${pad(d.getMinutes())}`;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ytThumb(id,q){return`https://i.ytimg.com/vi/${id}/${q||'mqdefault'}.jpg`;}
function getFiltered(){
  let a=TRACKS.map((t,i)=>({t,i}));
  if(activeGenre!=='ALL') a=a.filter(({t})=>t.genre===activeGenre);
  if(searchTerm){const q=searchTerm.toLowerCase();a=a.filter(({t})=>t.title.toLowerCase().includes(q)||t.artist.toLowerCase().includes(q));}
  if(sortBy==='az')    a.sort((a,b)=>a.t.artist.localeCompare(b.t.artist));
  else if(sortBy==='dur')   a.sort((a,b)=>(b.t.end-b.t.start)-(a.t.end-a.t.start));
  else if(sortBy==='plays') a.sort((a,b)=>(playCounts[b.i]||0)-(playCounts[a.i]||0));
  else if(tbRecentOrder.length) {
    // Sort by position in recent-plays index list.
    // orderMap keys are TRACK INDICES so each chapter is unique.
    const orderMap = new Map(tbRecentOrder.map((trackIdx, pos) => [trackIdx, pos]));
    a.sort((x, y) => {
      const px = orderMap.has(x.i) ? orderMap.get(x.i) : 99999;
      const py = orderMap.has(y.i) ? orderMap.get(y.i) : 99999;
      return px - py;
    });
  }
  return a;
}

// ══════════════════════════════════════════════════════════════════
//  SIDEBAR + CHIPS
// ══════════════════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════════════════
//  FEATURED COLUMN — Last Week #1 / Last Fortnight #1 / Latest Entry
// ══════════════════════════════════════════════════════════════════
function featTileHTML(track, isPlaying) {
  if (!track) return `<div class="feat-skeleton">No data yet</div>`;
  const col = gc(track.genre);
  return `<div class="feat-tile${isPlaying?' playing':''}" data-idx="${track._idx ?? -1}" data-video-id="${track.id}">
    <div class="tile-thumb">
      <img class="tile-thumb-img" src="https://i.ytimg.com/vi/${track.id}/mqdefault.jpg"
           onerror="this.style.display='none'" alt="">
      <span class="tile-genre" style="background:${col}">${track.genre}</span>
      <div class="tile-np"><div class="tile-np-title">${esc(track.song||track.title)}</div></div>
    </div>
    <div class="tile-meta">
      <div class="tile-artist">${esc(track.artist)}</div>
      <div class="tile-song">${esc(track.song||track.title)}</div>
    </div>
  </div>`;
}

async function buildFeaturedColumn() {
  const sb = document.getElementById('sidebar');

  sb.innerHTML = `
    <div class="feat-head">#1</div>
    <div class="feat-skeleton" id="feat-number1">Loading…</div>
    <div class="feat-head">Last Week's</div>
    <div class="feat-skeleton" id="feat-week">Loading…</div>
    <div class="feat-head">Latest Entry</div>
    <div class="feat-skeleton" id="feat-latest">Loading…</div>
  `;

  // Latest entry — last track in TRACKS array (most recently added)
  const latestTrack = TRACKS[TRACKS.length - 1];
  latestTrack._idx = TRACKS.length - 1;
  document.getElementById('feat-latest').outerHTML = featTileHTML(latestTrack, TRACKS.length-1 === currentIdx);

  // Pull Tinybird chart data
  try {
    const rows = await tbFetch('chart_scores');

    if (rows && rows.length) {
      // #1 — all-time top by ftp_score
      const allTimeRows = [...rows].sort((a,b) => parseFloat(b.ftp_score||0) - parseFloat(a.ftp_score||0));
      const allTimeTop  = allTimeRows[0];
      const allTimeIdx  = allTimeTop ? TRACKS.findIndex(t => t.id === allTimeTop.video_id) : -1;
      const allTimeTrack = allTimeIdx >= 0 ? {...TRACKS[allTimeIdx], _idx: allTimeIdx} : null;
      const n1El = document.getElementById('feat-number1');
      if (n1El) n1El.outerHTML = featTileHTML(allTimeTrack, allTimeIdx === currentIdx);

      // Last Week's — top by plays_7d
      const weekRows = [...rows].sort((a,b) => parseInt(b.plays_7d||0) - parseInt(a.plays_7d||0));
      const weekTop  = weekRows[0];
      const weekIdx  = weekTop ? TRACKS.findIndex(t => t.id === weekTop.video_id) : -1;
      const weekTrack = weekIdx >= 0 ? {...TRACKS[weekIdx], _idx: weekIdx} : null;
      const weekEl = document.getElementById('feat-week');
      if (weekEl) weekEl.outerHTML = featTileHTML(weekTrack, weekIdx === currentIdx);

    } else {
      ['feat-number1','feat-week'].forEach(id => {
        const el = document.getElementById(id);
        if (el) { el.innerHTML = '<div style="padding:10px 8px;font-size:0.6rem;color:var(--text-lo);letter-spacing:0.14em;text-transform:uppercase">No data yet</div>'; el.className = ''; }
      });
    }
  } catch(e) {
    console.warn('[featured]', e.message);
    ['feat-number1','feat-week'].forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.textContent = 'Unavailable'; el.className = 'feat-skeleton'; }
    });
  }

  // Wire click handlers on all feat tiles
  sb.querySelectorAll('.feat-tile').forEach(tile => {
    tile.addEventListener('click', () => {
      const idx = parseInt(tile.dataset.idx);
      if (idx >= 0) playTrack(idx);
      else {
        // fallback: find by video_id
        const vid = tile.dataset.videoId;
        const fi = TRACKS.findIndex(t => t.id === vid);
        if (fi >= 0) playTrack(fi);
      }
    });
  });
}

// ══════════════════════════════════════════════════════════════════
//  RENDER TILES
// ══════════════════════════════════════════════════════════════════
function renderTiles(items){
  const grid=document.getElementById('tile-grid');
  const noRes=document.getElementById('no-results-tiles');
  if(!items.length){grid.innerHTML='';noRes.style.display='block';return;}
  noRes.style.display='none';
  grid.innerHTML=items.map(({t,i})=>{
    const dur=t.end>t.start?fmtDur(t.end-t.start):'';
    const pc=playCounts[i]||0;
    return`<div class="tile${i===currentIdx?' playing':''}" data-idx="${i}" data-genre="${t.genre}">
      <div class="tile-thumb">
        <img class="tile-thumb-img" src="${ytThumb(t.id)}" loading="lazy" alt=""
             onerror="this.style.display='none';this.parentElement.querySelector('.tile-thumb-fb').style.display='flex'">
        <img class="tile-thumb-live" alt="">
        <div class="tile-thumb-fb" style="display:none">${t.genre}</div>
        <span class="tile-genre" style="background:${gc(t.genre)}">${t.genre}</span>
        <span class="tile-playing-badge">▶ ON AIR</span>
        <button class="tile-vote${hasVoted(t.id)?' voted':''}" data-idx="${i}" title="Vote">▲</button>
        <div class="tile-np">
          ${pc?`<div class="tile-np-plays">${pc}× played</div>`:''}
          <div class="tile-np-title">${esc(t.song||t.title)}</div>
        </div>
      </div>
      <div class="tile-meta">
        <div class="tile-artist">${esc(t.artist)}</div>
        <div class="tile-song">${esc(t.song)}</div>
        ${dur?`<div class="tile-dur">${dur}</div>`:''}
      </div>
    </div>`;
  }).join('');
  grid.querySelectorAll('.tile').forEach(tile=>{
    const idx=parseInt(tile.dataset.idx);
    let liveLoaded=false;
    const liveImg=tile.querySelector('.tile-thumb-live');
    tile.addEventListener('mouseenter',()=>{
      if(liveLoaded)return; liveLoaded=true;
      const img=new Image();
      img.onload=()=>{liveImg.src=img.src;liveImg.classList.add('ready');};
      img.onerror=()=>{const i2=new Image();i2.onload=()=>{liveImg.src=i2.src;liveImg.classList.add('ready');};i2.src=ytThumb(TRACKS[idx].id,'hqdefault');};
      img.src=ytThumb(TRACKS[idx].id,'maxresdefault');
    });
    tile.addEventListener('click',()=>playTrack(idx));
    // vote button — stop propagation so it doesn't trigger play
    const voteBtn = tile.querySelector('.tile-vote');
    if (voteBtn) {
      voteBtn.addEventListener('click', e => {
        e.stopPropagation();
        const t = TRACKS[idx];
        if (castVote(t.id, t.title, t.artist, t.genre)) {
          voteBtn.classList.add('voted');
        }
      });
    }
  });
}

// ══════════════════════════════════════════════════════════════════
//  RENDER CHART — Tinybird live with session fallback
// ══════════════════════════════════════════════════════════════════
async function renderChart(){
  const listEl=document.getElementById('chart-list');
  const badge=document.getElementById('chart-badge');
  const timelineEl=document.getElementById('timeline-entries');
  const histCount=document.getElementById('history-count');

  listEl.innerHTML='<div class="chart-loading">Loading chart…</div>';

  // Try Tinybird — with 10-min cache
  let usedTB=false, ranked=[];
  try {
    const now=Date.now();
    if(!tbChartCache || now-tbCacheTime>600_000 || chartPeriod==='recent'){
      tbChartCache=await tbFetch('chart_scores');
      tbCacheTime=now;
    }
    const rows=tbChartCache;
    if(rows?.length){
      usedTB=true;
      badge.textContent='TINYBIRD LIVE';
      badge.style.background='var(--red)';

      if(chartPeriod==='plays'){
        // Load previous rank snapshot from localStorage
        let prevRanks = {};
        try { prevRanks = JSON.parse(localStorage.getItem('vw_prev_ranks') || '{}'); } catch(e){}
        const isFirstLoad = Object.keys(prevRanks).length === 0;

        const sorted = [...rows].sort((a,b)=>parseFloat(b.ftp_score||0)-parseFloat(a.ftp_score||0)).slice(0,15);

        ranked = sorted.map((r,n)=>{
          const curRank  = n + 1;
          const prevRank = prevRanks[r.video_id];
          let momentum = '—';
          if (isFirstLoad) {
            momentum = 'NEW'; // first ever load — everything is new
          } else if (prevRank === undefined) {
            momentum = '↑'; // entered the chart — treat as rising
          } else {
            if (curRank < prevRank)       momentum = '↑';
            else if (curRank > prevRank)  momentum = '↓';
          }
          return {
            videoId: r.video_id, title: r.title, artist: r.artist, genre: r.genre,
            cnt: parseInt(r.total_plays)||0, score: Math.round(parseFloat(r.ftp_score)||0),
            momentum
          };
        });

        // Save current ranks for next visit
        const newSnapshot = {};
        sorted.forEach((r,n) => { newSnapshot[r.video_id] = n+1; });
        try { localStorage.setItem('vw_prev_ranks', JSON.stringify(newSnapshot)); } catch(e){}

      } else if(chartPeriod==='recent'){
        const recent=await tbFetch('recent_plays');
        const seen=new Set();
        ranked=recent.filter(r=>{if(seen.has(r.video_id))return false;seen.add(r.video_id);return true;})
          .slice(0,15).map(r=>({videoId:r.video_id,title:r.title,artist:r.artist,genre:r.genre,cnt:0,score:0,momentum:'NEW'}));
      } else {
        const byG={};rows.forEach(r=>{if(!byG[r.genre]||parseFloat(r.ftp_score||0)>parseFloat(byG[r.genre].ftp_score||0))byG[r.genre]=r;});
        ranked=Object.values(byG).sort((a,b)=>parseFloat(b.ftp_score||0)-parseFloat(a.ftp_score||0))
          .map(r=>({videoId:r.video_id,title:r.title,artist:r.artist,genre:r.genre,cnt:parseInt(r.total_plays)||0,score:Math.round(parseFloat(r.ftp_score)||0),momentum:'—'}));
      }
    }
  } catch(e){ console.warn('[vw] Tinybird:',e.message); }

  // Tinybird only — no session fallback
  if(!usedTB || !ranked.length){
    badge.textContent='NO DATA YET';
    badge.style.background='#444';
    listEl.innerHTML=`<div class="chart-loading">No plays recorded yet on VIDEO WON — start listening to build the chart</div>`;
    timelineEl.innerHTML=`<div class="chart-loading">No recent plays</div>`;
    histCount.textContent='—';
    return;
  }

  // Render list — no points shown, blue down arrow for overtaken
  const rankClass=n=>n===0?'gold':n===1?'silver':n===2?'bronze':'';
  listEl.innerHTML=ranked.map((r,n)=>{
    const momClass = r.momentum==='↑'?'up' : r.momentum==='↓'?'down' : r.momentum==='NEW'?'new' : 'same';
    const momGlyph = r.momentum==='↑'?'▲' : r.momentum==='↓'?'▼' : r.momentum==='NEW'?'★' : '—';
    return`<div class="chart-row${r.videoId===TRACKS[currentIdx]?.id?' playing':''}" data-video-id="${r.videoId||''}">
      <div class="chart-rank ${rankClass(n)}">${n+1}</div>
      <img class="chart-thumb-sm" src="${ytThumb(r.videoId)}" loading="lazy" alt="" onerror="this.style.display='none'">
      <div class="chart-info">
        <div class="chart-info-title">${esc(r.artist)}</div>
        <div class="chart-info-sub">${esc(r.title)}</div>
      </div>
      <div class="chart-move ${momClass}">${momGlyph}</div>
    </div>`;
  }).join('');
  listEl.querySelectorAll('.chart-row').forEach(row=>{
    row.addEventListener('click',()=>{const idx=TRACKS.findIndex(t=>t.id===row.dataset.videoId);if(idx>=0)playTrack(idx);});
  });

  let timeRows=[];
  try{
    if(usedTB){
      const recent=await tbFetch('recent_plays');
      timeRows=recent.slice(0,20).map(r=>{
        // Tinybird ts can be "2026-03-20 12:34:56" or ISO format
        let ts = r.ts || '';
        const ms = Date.parse(ts.includes('T') ? ts : ts.replace(' ','T')+'Z');
        return {id:r.video_id,title:r.title,artist:r.artist,genre:r.genre,playedAt:isNaN(ms)?Date.now():ms};
      });
    }
  }catch(e){ console.warn('[timeline]',e.message); }
  if(!timeRows.length) timeRows=playHistory.slice(0,20).map(h=>({id:h.id,title:h.title,artist:h.artist,genre:h.genre,playedAt:h.playedAt}));
  histCount.textContent=timeRows.length?`${timeRows.length} plays`:'—';
  timelineEl.innerHTML=timeRows.length
    ?timeRows.map(h=>`<div class="timeline-entry" data-id="${h.id}">
        <div class="timeline-time">${fmtTime(h.playedAt)}</div>
        <img class="timeline-thumb" src="${ytThumb(h.id)}" loading="lazy" alt="" onerror="this.style.display='none'">
        <div class="timeline-info"><div class="timeline-title">${esc(h.title)}</div><div class="timeline-artist">${esc(h.artist)}</div></div>
        <span class="timeline-tag" style="background:${gc(h.genre)}">${h.genre}</span>
      </div>`).join('')
    :`<div class="chart-loading">No plays recorded yet — start listening</div>`;
  timelineEl.querySelectorAll('.timeline-entry').forEach(e=>{
    e.addEventListener('click',()=>{const idx=TRACKS.findIndex(t=>t.id===e.dataset.id);if(idx>=0)playTrack(idx);});
  });
}

document.querySelectorAll('.chart-period-btn').forEach(b=>b.addEventListener('click',()=>{

  document.querySelectorAll('.chart-period-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');

function playTrack(idx){
  if(idx<0||idx>=TRACKS.length)return;
  const t=TRACKS[idx];
  currentIdx=idx; isPlaying=true;
  recordPlay(idx);

  // Player bar
  const wrap=document.getElementById('player-thumb-wrap');
  wrap.innerHTML=`<img class="player-thumb-img" src="${ytThumb(t.id)}" onerror="this.src='${ytThumb(t.id,'hqdefault')}'" alt="">`;
  document.getElementById('player-title').innerHTML=`<span class="player-genre-pip" style="background:${gc(t.genre)}"></span>${esc(t.title)}`;
  document.getElementById('player-artist').textContent=t.artist;
  document.getElementById('prog-dur').textContent=fmtDur(Math.max(0,t.end-t.start));
  document.getElementById('prog-cur').textContent='0:00';
  document.getElementById('prog-fill').style.width='0%';
  document.getElementById('btn-play').textContent='⏸';

  // Video info
  document.getElementById('vid-info-title').textContent=t.title;
  document.getElementById('vid-info-sub').textContent=t.artist;

  // Player vote button state
  const pvBtn = document.getElementById('player-vote');
  const pvCount = document.getElementById('player-vote-count');
  pvBtn.classList.toggle('voted', hasVoted(t.id));
  pvCount.textContent = '';
  pvBtn.onclick = () => {
    if (castVote(t.id, t.title, t.artist, t.genre)) {
      pvBtn.classList.add('voted');
    }
  };

  ensureYT(()=>{
    if(!ytPlayer) buildYTPlayer(t);
    else{ytPlayer.loadVideoById({videoId:t.id,startSeconds:t.start,endSeconds:t.end||undefined});ytPlayer.playVideo();}
    if(ytPlayer?.setVolume) ytPlayer.setVolume(currentVolume);
  });
  startProgress(t);
  render();
  // refresh featured column playing state
  document.querySelectorAll('.feat-tile').forEach(tile => {
    const idx = parseInt(tile.dataset.idx);
    tile.classList.toggle('playing', idx === currentIdx);
  });
}

function ensureYT(cb){
  if(ytReady){cb();return;}
  if(!ytApiLoading){
    ytApiLoading=true;
    const s=document.createElement('script');
    s.src='https://www.youtube.com/iframe_api';
    document.head.appendChild(s);
  }
  const w=setInterval(()=>{if(ytReady){clearInterval(w);cb();}},100);
}
window.onYouTubeIframeAPIReady=()=>{ytReady=true;};

function buildYTPlayer(t){
  const inner=document.getElementById('yt-inner');
  inner.innerHTML='';
  const div=document.createElement('div');
  div.id='yt-p';
  inner.appendChild(div);
  ytPlayer=new YT.Player('yt-p',{
    width:'320', height:'260',
    videoId:t.id,
    playerVars:{
      start:t.start, end:t.end||undefined,
      autoplay:1, controls:0, rel:0, modestbranding:1,
      disablekb:1, iv_load_policy:3, fs:0, playsinline:1,
      cc_load_policy:0,
    },
    events:{
      onReady(e){
        e.target.setVolume(currentVolume);
      },
      onStateChange(e){
        if(e.data===YT.PlayerState.ENDED)   onTrackEnd();
        if(e.data===YT.PlayerState.PLAYING){isPlaying=true;  document.getElementById('btn-play').textContent='⏸';}
        if(e.data===YT.PlayerState.PAUSED) {isPlaying=false; document.getElementById('btn-play').textContent='▶';}
      }
    }
  });
}

var _lastCurrentTime = 0;

// ══════════════════════════════════════════════════════════════════
//  SHUFFLE QUEUE
//  Pre-built weighted-random sequence. Next/prev/auto-advance all
//  use the same queue so there are no loops or linear walks.
// ══════════════════════════════════════════════════════════════════
let shuffleQueue   = [];  // ordered list of track indices
let shufflePos     = -1;  // current position in queue

// Build a fresh weighted-shuffle of all filteredIdxs.
// Tracks in tbRecentOrder get lower weight (heard recently).
// Tracks never played get the highest weight.
// Called when: filter changes, genre changes, first play.
function buildShuffleQueue(startIdx) {
  const pool = filteredIdxs.map(({i}) => i);
  if (!pool.length) { shuffleQueue = []; shufflePos = -1; return; }

  const orderLen = tbRecentOrder.length || 1;
  const orderPos = new Map(tbRecentOrder.map((idx, pos) => [idx, pos]));

  // Assign weights
  const weighted = pool.map(i => {
    const pos = orderPos.has(i) ? orderPos.get(i) : orderLen;
    return { i, w: (orderLen - pos) + 1 };
  });

  // Fisher-Yates weighted shuffle
  // Step 1: replicate each index proportional to its weight (capped for perf)
  const bag = [];
  for (const {i, w} of weighted) {
    const copies = Math.max(1, Math.round(w));
    for (let c = 0; c < copies; c++) bag.push(i);
  }
  // Step 2: shuffle the bag
  for (let k = bag.length - 1; k > 0; k--) {
    const j = Math.floor(Math.random() * (k + 1));
    [bag[k], bag[j]] = [bag[j], bag[k]];
  }
  // Step 3: deduplicate while preserving order
  const seen = new Set();
  shuffleQueue = bag.filter(i => { if (seen.has(i)) return false; seen.add(i); return true; });

  // Make sure every index in pool is included (weighted bag may miss low-weight tracks)
  for (const i of pool) {
    if (!seen.has(i)) shuffleQueue.push(i);
  }

  // Position the queue so startIdx is current
  shufflePos = startIdx !== undefined ? shuffleQueue.indexOf(startIdx) : 0;
  if (shufflePos < 0) shufflePos = 0;
}

function shuffleNext() {
  if (!shuffleQueue.length) return -1;
  shufflePos = (shufflePos + 1) % shuffleQueue.length;
  return shuffleQueue[shufflePos];
}

function shufflePrev() {
  if (!shuffleQueue.length) return -1;
  shufflePos = (shufflePos - 1 + shuffleQueue.length) % shuffleQueue.length;
  return shuffleQueue[shufflePos];
}

function onTrackEnd() {
  const next = shuffleNext();
  if (next >= 0) playTrack(next);
}

function startProgress(t){
  clearInterval(progInterval);
  const dur=Math.max(0,t.end-t.start); if(!dur) return;
  progInterval=setInterval(()=>{
    if(!ytPlayer||!isPlaying) return;
    try{
      const cur=Math.max(0,ytPlayer.getCurrentTime()-t.start);
      document.getElementById('prog-fill').style.width=Math.min(100,(cur/dur)*100)+'%';
      document.getElementById('prog-cur').textContent=fmtDur(Math.floor(cur));
    }catch(e){}
  },500);
}

// Controls
document.getElementById('btn-play').addEventListener('click',()=>{if(!ytPlayer)return;isPlaying?ytPlayer.pauseVideo():ytPlayer.playVideo();});
document.getElementById('btn-prev').addEventListener('click',()=>{ const i=shufflePrev(); if(i>=0) playTrack(i); });
document.getElementById('btn-next').addEventListener('click',()=>{ const i=shuffleNext(); if(i>=0) playTrack(i); });
document.getElementById('prog-track').addEventListener('click',e=>{
  if(!ytPlayer||currentIdx<0)return;
  const t=TRACKS[currentIdx];
  const pct=(e.clientX-e.currentTarget.getBoundingClientRect().left)/e.currentTarget.offsetWidth;
  ytPlayer.seekTo(t.start+pct*(t.end-t.start),true);
});

searchInput.addEventListener('input', e => {
  searchTerm = e.target.value.trim();
  searchClear.classList.toggle('visible', searchTerm.length > 0);
  render();
});
searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchTerm = '';

});

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT') return;
  if(e.code==='Space'){e.preventDefault();document.getElementById('btn-play').click();}
  if(e.code==='ArrowRight') document.getElementById('btn-next').click();
  if(e.code==='ArrowLeft')  document.getElementById('btn-prev').click();
  if(e.code==='ArrowUp'){currentVolume=Math.min(100,currentVolume+10);volSlider.value=currentVolume;if(ytPlayer?.setVolume)ytPlayer.setVolume(currentVolume);}
  if(e.code==='ArrowDown'){currentVolume=Math.max(0,currentVolume-10);volSlider.value=currentVolume;if(ytPlayer?.setVolume)ytPlayer.setVolume(currentVolume);}
});

  const str=[n.getHours(),n.getMinutes(),n.getSeconds()].map(x=>String(x).padStart(2,'0')).join(':');
  document.getElementById('clock').textContent=str;
}
